---
configuration:
  log_level:
    name: 로그 레벨
    description: >-
      애드온 자체 로그와 컬렉터 내부 로깅의 출력 수준. 기본값은 `info`.
      파이프라인 상세 활동을 보려면 `debug`, 전체 컬렉터 내부를 보려면
      `trace`로 설정하세요.
  otlp_endpoint:
    name: OTLP 엔드포인트
    description: >-
      OTLP 게이트웨이의 Host:Port (예: gRPC는 `lgtm.local:4317`,
      HTTP는 `lgtm.local:4318`). 비워두면 OTLP 내보내기를 비활성화합니다
      (자체 모니터링만 동작).
  otlp_protocol:
    name: OTLP 프로토콜
    description: >-
      전송 프로토콜 — `grpc` 또는 `http`. 대상 엔드포인트가
      기대하는 값과 일치해야 합니다.
  otlp_headers:
    name: OTLP 헤더
    description: >-
      모든 OTLP 요청에 추가할 HTTP/gRPC 헤더.
      `Authorization`이나 `X-Scope-OrgID` (Grafana Cloud) 등에 사용합니다.
  otlp_tls_insecure:
    name: TLS 검증 비활성화
    description: >-
      TLS 인증서 검증을 건너뜁니다. 자체 서명 인증서를 사용하는
      로컬/테스트 엔드포인트에서만 활성화하세요.
  ha_logs_enabled:
    name: HA 로그 수집
    description: >-
      Supervisor API(`/core/logs/follow`)를 통해 Home Assistant Core
      로그를 스트리밍하여 OTLP 로그 레코드로 내보냅니다.
      파일 마운트가 필요하지 않습니다.
  ha_metrics_enabled:
    name: HA 메트릭 수집
    description: >-
      WebSocket API를 통해 Home Assistant 상태 변경을 구독하고 수치형
      엔티티 상태를 OTLP 메트릭으로 내보냅니다. 별도의 HA 통합구성요소가
      필요하지 않습니다.
  ha_events_enabled:
    name: HA 이벤트 로그 수집
    description: >-
      WebSocket API를 통해 `system_log_event`를 구독하고 HA 오류/경고
      이벤트를 구조화된 OTLP 로그 레코드로 내보냅니다 (스택 트레이스 및
      소스 위치 포함). HA System Log 통합구성요소에서 `fire_event: true`를
      활성화해야 합니다 (`configuration.yaml: logger: fire_event: true`).
  ha_traces_enabled:
    name: HA 트레이스 수집
    description: >-
      Home Assistant 이벤트 컨텍스트 체인(service_call → automation_triggered
      → state_changed)을 `context.id`/`context.parent_id` 그래프를 사용해
      OTLP 트레이스로 변환합니다. 추가 HA 설정이 필요하지 않습니다.
  ha_trace_events:
    name: 트레이스 이벤트 유형
    description: >-
      OTLP 트레이스 스팬을 생성할 Home Assistant 이벤트 유형의 목록입니다.
      트레이스가 필요하지 않은 이벤트 유형은 목록에서 제거하세요
      (예: `state_changed`를 제거하면 상세 스팬 속성이 생성되지 않습니다).
      알 수 없는 이벤트 유형도 허용되지만 경고가 기록됩니다.
  container_logs_enabled:
    name: 컨테이너 로그 수집
    description: >-
      Supervisor API를 통해 Supervisor 및 모든 애드온의 로그와 리소스
      통계를 수집합니다. 활성화 시 `hassio_role: manager` 권한이
      자동으로 부여됩니다. 기본값은 비활성화입니다.
  host_metrics_enabled:
    name: 호스트 메트릭 수집
    description: >-
      호스트 메트릭(CPU, 메모리, 디스크, 네트워크)은 `ha_metrics_enabled`가
      켜져 있고 HA `system_monitor` 통합구성요소가 설정되어 있으면 자동으로
      수집됩니다 — 별도 옵션이나 보호 모드 변경이 필요하지 않습니다.
      이 토글은 향후 네이티브 구현을 위해 예약되어 있으며 현재는 동작하지
      않습니다.
  raw_config:
    name: Raw otelcol 설정
    description: >-
      완전한 OpenTelemetry Collector 파이프라인 설정(YAML)을 직접
      붙여넣으세요. 비어있지 않으면 위의 구조화된 옵션들은 모두
      무시되고 이 설정이 그대로 사용됩니다 (번들 자체 모니터링
      기준선 위에 병합).
