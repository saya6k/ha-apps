---
configuration:
  log_level:
    name: 로그 레벨
    description: >-
      애드온 자체 로그와 컬렉터 내부 로깅의 출력 수준. 기본값은 `info`.
      파이프라인 상세 활동을 보려면 `debug`, 전체 컬렉터 내부를 보려면
      `trace`로 설정하세요.
  otlp_endpoint:
    name: OTLP 엔드포인트
    description: >-
      OTLP 게이트웨이의 Host:Port (예: gRPC는 `lgtm.local:4317`,
      HTTP는 `lgtm.local:4318`). 비워두면 OTLP 내보내기를 비활성화합니다
      (자체 모니터링만 동작).
  otlp_protocol:
    name: OTLP 프로토콜
    description: >-
      전송 프로토콜 — `grpc` 또는 `http`. 대상 엔드포인트가
      기대하는 값과 일치해야 합니다.
  otlp_headers:
    name: OTLP 헤더
    description: >-
      모든 OTLP 요청에 추가할 HTTP/gRPC 헤더.
      `Authorization`이나 `X-Scope-OrgID` (Grafana Cloud) 등에 사용합니다.
  otlp_tls_insecure:
    name: TLS 검증 비활성화
    description: >-
      TLS 인증서 검증을 건너뜁니다. 자체 서명 인증서를 사용하는
      로컬/테스트 엔드포인트에서만 활성화하세요.
  ha_logs_enabled:
    name: HA 로그 수집
    description: >-
      `/config/home-assistant.log`를 tail하여 로그 항목을 OTLP 로그
      레코드로 내보냅니다. `homeassistant_config` 마운트가 필요합니다
      (기본 활성화).
  ha_metrics_enabled:
    name: HA 메트릭 수집
    description: >-
      Home Assistant의 `/api/prometheus` 엔드포인트를 스크래핑하여
      OTLP 메트릭으로 내보냅니다. HA에 Prometheus 통합구성요소가
      활성화되어 있어야 합니다.
  container_logs_enabled:
    name: 컨테이너 로그 수집
    description: >-
      Docker 소켓을 통해 Supervisor 및 모든 애드온 컨테이너의
      stdout/stderr를 수집합니다. 보호 모드 비활성화가 필요합니다.
      아직 구현되지 않음 — `raw_config`로 수동 설정하세요.
  host_metrics_enabled:
    name: 호스트 메트릭 수집
    description: >-
      HAOS 호스트의 CPU, 메모리, 디스크, 네트워크 메트릭을 수집합니다.
      아직 구현되지 않음 — `raw_config`로 수동 설정하세요.
  raw_config:
    name: Raw otelcol 설정
    description: >-
      완전한 OpenTelemetry Collector 파이프라인 설정(YAML)을 직접
      붙여넣으세요. 비어있지 않으면 위의 구조화된 옵션들은 모두
      무시되고 이 설정이 그대로 사용됩니다 (번들 자체 모니터링
      기준선 위에 병합).
