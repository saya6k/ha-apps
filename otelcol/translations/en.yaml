---
configuration:
  log_level:
    name: Log level
    description: >-
      Verbosity threshold for the add-on's own log lines and the collector's
      internal logging. `info` is the default; set to `debug` to see detailed
      pipeline activity, `trace` for full collector internals.
  otlp_endpoint:
    name: OTLP endpoint
    description: >-
      Host:port of the OTLP gateway (e.g. `lgtm.local:4317` for gRPC,
      `lgtm.local:4318` for HTTP). Leave empty to disable OTLP export
      (self-monitoring only).
  otlp_protocol:
    name: OTLP protocol
    description: >-
      Transport protocol — `grpc` or `http`. Must match what the
      target endpoint expects.
  otlp_headers:
    name: OTLP headers
    description: >-
      Additional HTTP/gRPC headers to send with every OTLP request.
      Use for `Authorization` or `X-Scope-OrgID` (Grafana Cloud).
  otlp_tls_insecure:
    name: TLS insecure
    description: >-
      Skip TLS certificate verification. Enable only for local/testing
      endpoints with self-signed certificates.
  ha_logs_enabled:
    name: Collect HA logs
    description: >-
      Stream Home Assistant Core logs via the Supervisor API
      (`/core/logs/follow`) and export as OTLP log records.
      No file mount required.
  ha_metrics_enabled:
    name: Collect HA metrics
    description: >-
      Subscribe to Home Assistant state changes via the WebSocket API and
      export numeric entity states as OTLP metrics. No extra HA integration
      required.
  ha_events_enabled:
    name: Collect HA events as logs
    description: >-
      Subscribe to `system_log_event` via the WebSocket API and export HA
      error/warning events as structured OTLP log records (includes stack traces
      and source location). Requires enabling `fire_event: true` in HA's System
      Log integration (`configuration.yaml: logger: fire_event: true`).
  ha_traces_enabled:
    name: Collect HA traces
    description: >-
      Map Home Assistant event context chains (service_call → automation_triggered
      → state_changed) to OTLP traces using the `context.id` / `context.parent_id`
      graph. No extra HA configuration required.
  container_logs_enabled:
    name: Collect container logs
    description: >-
      Collect logs and resource stats from the Supervisor and every add-on
      via the Supervisor API. Requires `hassio_role: manager` (granted
      automatically when enabled). Off by default.
  host_metrics_enabled:
    name: Collect host metrics
    description: >-
      Collect CPU, memory, disk, and network metrics from the HAOS host.
      Not yet implemented — use `raw_config` to configure manually.
  raw_config:
    name: Raw otelcol config
    description: >-
      Paste a complete OpenTelemetry Collector pipeline configuration
      (YAML). When non-empty, all structured options above are ignored
      and this config is used verbatim, layered on top of the bundled
      self-monitoring baseline.
