version: 0.8.0
slug: nemotron-asr-c
name: Nemotron ASR (C)
description: >-
  Streaming speech-to-text over Wyoming — NVIDIA Nemotron ASR on pure C
  (nemotron-asr-streaming.c), converts .nemo at boot
url: https://github.com/kdrkdrkdr/nemotron-asr-streaming.c
arch:
  - amd64
  - aarch64
init: false
discovery:
  - wyoming
backup_exclude:
  - models/**
options:
  model: nvidia/nemotron-3.5-asr-streaming-0.6b
  quantization: q8p
  chunk_size: 320ms
  hf_token: ''
  hotwords: []
  hotword_boost: 2
  speech_enhancement: false
schema:
  model: str
  quantization: list(f32|bf16|q8p)
  chunk_size: list(80ms|160ms|320ms|560ms|1120ms)
  hf_token: password?
  hotwords:
    - str?
  hotword_boost: float?
  speech_enhancement: bool?
  debug_logging: bool?
ports:
  10370/tcp: null
ports_description:
  10370/tcp: Nemotron ASR (C) Wyoming Protocol
homeassistant: 2023.8.0.dev20230718
