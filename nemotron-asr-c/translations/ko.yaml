---
configuration:
  model:
    name: 모델 (HuggingFace 저장소)
    description: >-
      다운로드하여 변환하고 실행할 .nemo 모델 파일이 포함된 HuggingFace
      저장소 ID입니다. 모든 Nemotron 아키텍처 .nemo (파인튜닝된 변형 포함)를
      지원합니다 — .nemo는 부트 시 C 런타임 .bin으로 변환됩니다. 변경하면
      다음 시작 시 다시 다운로드하고 변환합니다.
  quantization:
    name: 가중치 양자화
    description: >-
      변환된 .bin 런타임 파일의 가중치 정밀도입니다. f32 = 양자화 없음 (가장
      큼, 비트 정확 레퍼런스); q8p = W8A8 패킹 int8 (기본값, 가장 빠름).
      변경하면 다음 시작 시 다시 변환합니다.
  chunk_size:
    name: 청크 크기 (정확도 vs 속도)
    description: >-
      인코더가 사용하는 스트리밍 미리보기(att_right)입니다. 클수록 더 많은
      오른쪽 컨텍스트 = 더 정확하지만 청크당 더 많은 연산이 필요합니다. 80ms
      (가장 빠름) · 160ms · 320ms (기본값) · 560ms · 1120ms (가장 정확).
      다시 다운로드하지 않으며 다음 시작 시 적용됩니다.
  hf_token:
    name: HuggingFace 토큰
    description: >-
      제한된/비공개 모델 저장소 접근 및 익명 다운로드 속도 제한 해제를 위한
      선택적 액세스 토큰입니다. 공개 모델은 비워 두세요.
  speech_enhancement:
    name: 음성 향상 (노이즈 제거)
    description: >-
      전사 전에 입력 오디오에 경량 FastEnhancer 노이즈 제거 필터를 적용합니다.
      시끄러운 환경에서 정확도를 높일 수 있지만, 이미 깨끗한 오디오에서는 약간
      저하될 수 있습니다. 기본값은 꺼짐입니다.
  debug_logging:
    name: 디버그 로깅
    description: 문제 해결을 위한 상세 로깅을 활성화합니다.
