version: 0.3.5
slug: nemo-asr-cpp
name: NeMo ASR (cpp)
description: >-
  Streaming speech-to-text with hotword boosting over Wyoming — NVIDIA Nemotron
  ASR on ggml (parakeet.cpp)
url: https://github.com/mudler/parakeet.cpp
arch:
  - amd64
  - aarch64
init: false
apparmor: true
discovery:
  - wyoming
backup_exclude:
  - models/**
options:
  model: Nemotron 3.5 Streaming 0.6b
  quantization: q4_k
  chunk_size: 320ms
  hotwords: []
  hf_token: ''
schema:
  model: list(Nemotron 3.5 Streaming 0.6b)
  quantization: list(q4_k|q5_k|q6_k|q8_0|f16)
  chunk_size: list(80ms|320ms|560ms|1120ms)
  hotwords:
    - str?
  hotword_boost: float(0,10)?
  hf_token: password?
  debug_logging: bool?
ports:
  10360/tcp: null
ports_description:
  10360/tcp: NeMo ASR (cpp) Wyoming Protocol
homeassistant: 2023.8.0.dev20230718
