---
configuration:
  model:
    name: Model
    description: >-
      Which ASR model to download and run. Every model here is streaming with
      hotword-boost support. Currently "Nemotron 3.5 Streaming 0.6b"
      (multilingual, 40+ locales) is the only supported model — more NeMo
      streaming models may be added later. The language comes from the Home
      Assistant voice pipeline; no language option is needed. Changing this
      downloads the new model on next start.
  quantization:
    name: Model quantization
    description: >-
      GGUF weight precision of the downloaded model. q4_k = smallest/fastest and
      lowest RAM (default); f16 = best quality but ~4x larger. Changing this
      re-downloads the model on next start.
  chunk_size:
    name: Chunk size (accuracy vs speed)
    description: >-
      Streaming lookahead the model uses. Larger = more right-context = more
      accurate, but a bit more compute (higher RTF); smaller = faster/less
      accurate. 80ms (fastest) · 320ms (default) · 560ms · 1120ms (most
      accurate). No re-download — applied to the existing model on next start.
  hotwords:
    name: Hotwords (vocabulary biasing)
    description: >-
      Phrases to bias recognition toward — one per item (room names, entity
      names, people). Useful for known vocabulary the model otherwise mishears.
      Best-effort greedy biasing; it can only flip near-ties.
  hotword_boost:
    name: Hotword boost
    description: >-
      Advanced. Strength of the hotword bias (logit bonus per token). Default 2.
      Higher pushes harder toward hotwords, but values above ~3 can destabilize
      decoding and cause garbled output.
  hf_token:
    name: HuggingFace token
    description: >-
      Optional access token for gated/private model repos and to lift anonymous
      download rate limits. Leave empty for public models.
  debug_logging:
    name: Debug logging
    description: Enable verbose logging for troubleshooting.
