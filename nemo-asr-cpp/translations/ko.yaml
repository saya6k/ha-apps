---
configuration:
  model:
    name: 모델
    description: >-
      다운로드하여 실행할 ASR 모델. 여기 모델은 모두 스트리밍이며 핫워드 부스트를
      지원합니다. 현재 "Nemotron 3.5 Streaming 0.6b"(다국어, 40개 이상 로케일)가
      유일하게 지원되는 모델이며, 추후 다른 NeMo 스트리밍 모델이 추가될 수
      있습니다. 언어는 Home Assistant 음성 파이프라인에서 전달되므로 별도 언어
      옵션이 필요 없습니다. 변경하면 다음 시작 시 새 모델을 다운로드합니다.
  quantization:
    name: 모델 양자화
    description: >-
      다운로드할 GGUF 모델의 가중치 정밀도. q4_k = 가장 작고 빠르며 RAM도 최소
      (기본값), f16 = 품질 최고지만 약 4배 큼. 변경하면 다음 시작 시 모델을 다시
      다운로드합니다.
  chunk_size:
    name: 청크 크기 (정확도 vs 속도)
    description: >-
      모델이 사용하는 스트리밍 lookahead. 클수록 우측 컨텍스트가 많아 정확하지만
      연산이 약간 늘어 RTF가 올라가고, 작을수록 빠르지만 정확도가 낮아집니다.
      80ms(가장 빠름) · 320ms(기본) · 560ms · 1120ms(가장 정확). 재다운로드
      없이 다음 시작 시 기존 모델에 적용됩니다.
  hotwords:
    name: 핫워드 (어휘 바이어싱)
    description: >-
      인식을 유도할 구를 항목당 하나씩 입력합니다 (방 이름, 엔티티 이름, 사람
      이름 등). 모델이 자주 틀리는 고유 어휘에 유용합니다. greedy 디코딩 특성상
      박빙인 경우만 뒤집는 best-effort 방식입니다.
  hotword_boost:
    name: 핫워드 가중치
    description: >-
      고급. 핫워드 바이어스 강도(토큰당 로짓 가산점). 기본값 2. 높일수록 핫워드를
      더 강하게 유도하지만, 약 3을 넘으면 디코딩이 불안정해져 출력이 깨질 수
      있습니다.
  hf_token:
    name: HuggingFace 토큰
    description: >-
      게이트/비공개 모델 저장소 접근 및 익명 다운로드 속도 제한 해제를 위한
      선택적 토큰. 공개 모델이면 비워 두세요.
  debug_logging:
    name: 디버그 로깅
    description: 문제 해결을 위한 상세 로깅을 활성화합니다.
