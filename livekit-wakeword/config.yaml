version: 0.19.0
slug: livekit-wakeword
name: LiveKit WakeWord
stage: experimental
description: >-
  On-device wake word detection over Wyoming — livekit-wakeword runtime (also
  runs openWakeWord models)
url: https://github.com/livekit/livekit-wakeword
arch:
  - amd64
  - aarch64
init: false
discovery:
  - wyoming
map:
  - share:ro
backup_exclude:
  - models/**
options:
  models:
    - hey_jarvis
  threshold: 0.5
  trigger_level: 1
  debug_logging: false
schema:
  models:
    - list(hey_livekit|alexa|hey_jarvis|hey_mycroft|hey_rhasspy)
  threshold: float(0,1)
  trigger_level: int(1,10)
  debug_logging: bool?
ports:
  10400/tcp: null
ports_description:
  10400/tcp: LiveKit WakeWord Wyoming Protocol
homeassistant: 2023.9.0.dev20230809
