# Smoke-run config: validate the VoxCPM2 pipeline on this Mac (MPS) with a
# tiny sample count before committing to a production run.
# Run:  livekit-wakeword setup --config bixby_smoke.yaml --skip-acav
#       livekit-wakeword run bixby_smoke.yaml

model_name: bixby_smoke

target_phrases:
  - "빅스비"

tts_backend: voxcpm

# Small diversification grid for the smoke run (production uses the defaults).
voxcpm_tts:
  voice_design_prompts:
    - "A young adult Korean woman, clear mid-pitch voice, moderate pace, calm tone"
    - "A middle-aged Korean man, warm baritone, steady pace, friendly tone"
  cfg_values: [2.0]
  inference_timesteps_list: [10]

n_samples: 24
n_samples_val: 8
n_background_samples: 40
n_background_samples_val: 8
tts_batch_size: 2

# Auto adversarial negatives are English/CMUdict-biased — Korean phrases must
# be supplied manually. Phonetic neighbours of 빅스비:
custom_negative_phrases:
  - "빅스"
  - "비스비"
  - "믹스비"
  - "픽스"
  - "빅수"
  - "이 수비"
  - "빅스비스킷"

data_dir: ./data
output_dir: ./output

augmentation:
  clip_duration: 2.0
  batch_size: 8
  rounds: 2
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

# Smoke: tiny dnn, few steps. Production: conv_attention / small, 50000 steps.
model:
  model_type: dnn
  model_size: tiny

steps: 500
learning_rate: 0.001
max_negative_weight: 1000
target_fp_per_hour: 1.0

batch_n_per_class:
  positive: 10
  adversarial_negative: 10
  ACAV100M_sample: 64
  background_noise: 10
