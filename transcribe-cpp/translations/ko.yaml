---
configuration:
  model:
    name: 모델
    description: >-
      다운로드해서 실행할 ASR 모델(transcribe.cpp GGUF 카탈로그). 언어는 Home
      Assistant 음성 파이프라인에서 자동으로 전달됩니다. 변경하면 다음 시작 시
      새 모델을 다운로드합니다.
  quantization:
    name: 모델 양자화
    description: >-
      다운로드할 모델의 GGUF 가중치 정밀도입니다. q4_k_m은 가장 작고 빠르며
      메모리를 적게 씁니다(기본값); f16은 품질이 가장 좋지만 훨씬 큽니다.
      선택한 모델에 해당 정밀도가 없으면 자동으로 가장 가까운 상위 정밀도를
      사용합니다. 변경하면 모델을 다시 다운로드합니다.
  custom_model:
    name: 커스텀 모델 (HuggingFace repo ID)
    description: >-
      직접 파인튜닝한 체크포인트(예: Whisper 파인튜닝)를 이 기기에서 GGUF로
      변환해 사용합니다 — 위의 모델 선택보다 우선합니다. 최초 변환 시
      torch-cpu를 /data에 설치하므로 느리며, 결과는 캐시됩니다. Whisper
      아키텍처 체크포인트를 지원합니다.
  speech_enhancement:
    name: 음성 향상
    description: >-
      FastEnhancer로 잡음을 제거한 뒤 전사합니다. 시끄러운 환경에서
      유용합니다. 프레임 단위로 처리하므로 실시간 부분 전사도 그대로
      유지됩니다.
  fastenhancer_size:
    name: FastEnhancer 모델 크기
    description: >-
      음성 향상 모델의 크기입니다. 클수록 잡음 제거 품질이 좋지만 CPU를 더
      씁니다. 비워두면 base를 사용합니다.
  hf_token:
    name: HuggingFace 토큰
    description: >-
      비공개/게이트 모델 저장소 접근 및 익명 다운로드 속도 제한 해제를 위한
      선택적 토큰입니다. 공개 모델은 비워두세요.
  log_level:
    name: 로그 레벨
    description: >-
      앱 로그의 상세 수준입니다. 문제 해결 시 debug/trace, 평상시에는
      info(기본값)를 사용하세요.
