---
name: CRW Web Tools
version: 0.3.0-rc.2
image: ghcr.io/saya6k/app-crw
slug: crw
description: >-
  Web search and page scraping for Assist conversation agents over MCP.
  Bundles SearXNG meta search and the crw scraper, exposed as web_search
  and web_scrape tools via streamable HTTP.
url: https://github.com/saya6k/ha-app-crw
arch:
  - aarch64
  - amd64
init: false
startup: services
stage: experimental
discovery:
  - mcp
ports:
  8099/tcp: null
ports_description:
  8099/tcp: >-
    MCP endpoint (streamable HTTP at /mcp). Leave unset — Home Assistant
    reaches it over the internal network; map it only for external MCP
    clients.
options:
  image_search_providers: []
  max_search_results: 3
  news_search_providers: []
  outgoing_proxy: ''
  safe_search: 1
  video_search_providers: []
  wiki_search_providers: []
schema:
  brave_api_key: password?
  flickr_api_key: password?
  image_search_providers:
    - list(baidu|bing|brave|deviantart|duckduckgo|flickr|google|imgur|mojeek|naver|openverse|pexels|pixabay|presearch|qwant|sogou|unsplash|wallhaven|yandex)?
  max_search_results: int(1,6)
  news_search_providers:
    - list(ansa|bing|brave|chinaso|duckduckgo|google|ilpost|karmasearch|mojeek|naver|presearch|qwant|reuters|tagesschau|yahoo)?
  outgoing_proxy: str?
  safe_search: int(0,2)
  video_search_providers:
    - list(360search|bilibili|bing|brave|dailymotion|duckduckgo|google|naver|niconico|odysee|peertube|pixabay|presearch|qwant|rumble|sepiasearch|sogou|vimeo|youtube)?
  wiki_search_providers:
    - list(encyclosearch|wikibooks|wikidata|wikinews|wikipedia|wikiquote|wikisource|wikispecies|wikivoyage|wiktionary)?
  youtube_api_key: password?
