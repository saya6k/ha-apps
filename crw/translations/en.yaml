---
configuration:
  brave_api_key:
    name: Brave Search API key
    description: >-
      Optional. Adds the Brave Search API as an extra web_search source.
      Get a key at brave.com/search/api. Leave empty to skip.
  flickr_api_key:
    name: Flickr API key
    description: >-
      Optional. Adds Flickr (API) as an extra image_search provider.
      Get a key at flickr.com/services/api. Leave empty to skip.
  image_search_providers:
    name: Image search providers
    description: >-
      Providers for the image_search tool. Leave empty to disable the
      tool entirely (it will not be offered to the conversation agent).
  news_search_providers:
    name: News search providers
    description: >-
      Providers for the news_search tool. Leave empty to disable the
      tool entirely.
  video_search_providers:
    name: Video search providers
    description: >-
      Providers for the video_search tool (picking naver searches Naver
      Video, youtube searches YouTube, and so on). Leave empty to disable
      the tool entirely.
  wiki_search_providers:
    name: Wiki search providers
    description: >-
      Wikis for the wiki_search tool (Wikipedia and friends). Leave empty
      to disable the tool entirely.
  max_search_results:
    name: Maximum search results
    description: >-
      Upper bound on the number of results web_search returns to the
      conversation agent (1-6). The agent may request fewer per call.
  outgoing_proxy:
    name: Outgoing proxy
    description: >-
      Optional HTTP/SOCKS proxy URL (e.g. socks5://10.0.0.2:1080) for all
      outgoing search and scrape traffic. Useful when search engines or
      sites block your network's address (anti-bot). Leave empty for a
      direct connection.
  safe_search:
    name: Safe search
    description: >-
      SearXNG safe search level — 0 off, 1 moderate, 2 strict.
  youtube_api_key:
    name: YouTube Data API key
    description: >-
      Optional. Adds the official YouTube Data API v3 as an extra
      video_search provider (higher quality than the default scraper).
      Get a key in the Google Cloud console. Leave empty to skip.
