---
configuration:
  brave_api_key:
    name: Brave Search API 키
    description: >-
      선택 사항. Brave Search API를 web_search의 추가 소스로 더합니다.
      brave.com/search/api에서 발급. 비우면 사용하지 않습니다.
  flickr_api_key:
    name: Flickr API 키
    description: >-
      선택 사항. Flickr(API)를 image_search의 추가 제공자로 더합니다.
      flickr.com/services/api에서 발급. 비우면 사용하지 않습니다.
  image_search_providers:
    name: 이미지 검색 제공자
    description: >-
      image_search tool이 사용할 제공자. 비우면 tool 자체가 비활성화되어
      conversation agent에 노출되지 않습니다.
  news_search_providers:
    name: 뉴스 검색 제공자
    description: >-
      news_search tool이 사용할 제공자. 비우면 tool이 비활성화됩니다.
  video_search_providers:
    name: 동영상 검색 제공자
    description: >-
      video_search tool이 사용할 제공자 (naver를 고르면 네이버 동영상,
      youtube를 고르면 YouTube를 검색). 비우면 tool이 비활성화됩니다.
  wiki_search_providers:
    name: 위키 검색 제공자
    description: >-
      wiki_search tool이 사용할 위키 (Wikipedia 계열). 비우면 tool이
      비활성화됩니다.
  max_search_results:
    name: 최대 검색 결과 수
    description: >-
      web_search가 conversation agent에 반환하는 결과 수의 상한 (1-6).
      agent가 호출마다 더 적게 요청할 수 있습니다.
  outgoing_proxy:
    name: 아웃고잉 프록시
    description: >-
      모든 검색·스크레이핑 트래픽에 사용할 HTTP/SOCKS 프록시 URL
      (예: socks5://10.0.0.2:1080). 검색 엔진이나 사이트가 현재 네트워크
      주소를 차단(anti-bot)할 때 유용합니다. 비우면 직접 연결합니다.
  safe_search:
    name: 세이프 서치
    description: >-
      SearXNG 세이프 서치 수준 — 0 끔, 1 보통, 2 엄격.
  youtube_api_key:
    name: YouTube Data API 키
    description: >-
      선택 사항. 공식 YouTube Data API v3를 video_search의 추가 제공자로
      더합니다(기본 스크레이퍼보다 품질 우수). Google Cloud 콘솔에서 발급.
      비우면 사용하지 않습니다.
