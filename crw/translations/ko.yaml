---
configuration:
  image_search_providers:
    name: 이미지 검색 제공자
    description: >-
      image_search tool이 사용할 제공자. 비우면 tool 자체가 비활성화되어
      conversation agent에 노출되지 않습니다.
  news_search_providers:
    name: 뉴스 검색 제공자
    description: >-
      news_search tool이 사용할 제공자. 비우면 tool이 비활성화됩니다.
  provider_api_keys:
    name: 제공자 API 키
    description: >-
      키가 필요한 SearXNG 엔진을 활성화하는 "엔진이름: 키" 항목들
      (예: "youtube_api: <YouTube Data API v3 키>", "flickr_api: <키>").
      대부분의 제공자는 키가 필요 없습니다.
  video_search_providers:
    name: 동영상 검색 제공자
    description: >-
      video_search tool이 사용할 제공자 (naver를 고르면 네이버 동영상,
      youtube를 고르면 YouTube를 검색). 비우면 tool이 비활성화됩니다.
  wiki_search_providers:
    name: 위키 검색 제공자
    description: >-
      wiki_search tool이 사용할 위키 (Wikipedia 계열). 비우면 tool이
      비활성화됩니다.
  max_search_results:
    name: 최대 검색 결과 수
    description: >-
      web_search가 conversation agent에 반환하는 결과 수의 상한 (1-6).
      agent가 호출마다 더 적게 요청할 수 있습니다.
  outgoing_proxy:
    name: 아웃고잉 프록시
    description: >-
      모든 검색·스크레이핑 트래픽에 사용할 HTTP/SOCKS 프록시 URL
      (예: socks5://10.0.0.2:1080). 검색 엔진이나 사이트가 현재 네트워크
      주소를 차단(anti-bot)할 때 유용합니다. 비우면 직접 연결합니다.
  safe_search:
    name: 세이프 서치
    description: >-
      SearXNG 세이프 서치 수준 — 0 끔, 1 보통, 2 엄격.
  search_engines:
    name: 검색 엔진
    description: >-
      검색에 사용할 엔진을 선택하세요 — 선택한 엔진들이 전체 활성 셋이
      되며, 엔진 간 의존성은 자동으로 추가됩니다. 비우면 SearXNG 기본값에서
      문제 있는 엔진 몇 개를 뺀 셋을 사용합니다 — wikidata(시작 시 403),
      ahmia/torch(Tor 프록시 필요), startpage(응답 파서 고장), qwant(즉시
      rate limit). 해당 엔진을 선택하면 다시 켤 수 있습니다.
