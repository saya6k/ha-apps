---
configuration:
  docker_enabled:
    name: docker.io 캐시 사용
    description: >-
      docker.io(registry-1.docker.io)용 pull-through 캐시를 실행합니다.
      `docker-cache.local:5000`으로 접근하며, 클라이언트 설정은 DOCS.md를
      참고하세요.
  docker_cache_ttl:
    name: docker.io 캐시 TTL
    description: >-
      캐시된 docker.io blob/manifest를 가비지 컬렉션하기 전까지 보관하는
      기간입니다. 예: `168h`, `30m`.
  ghcr_enabled:
    name: ghcr.io 캐시 사용
    description: >-
      ghcr.io용 pull-through 캐시를 실행합니다. `ghcr-cache.local:5000`으로
      접근하며, 클라이언트 설정은 DOCS.md를 참고하세요.
  ghcr_cache_ttl:
    name: ghcr.io 캐시 TTL
    description: >-
      캐시된 ghcr.io blob/manifest를 가비지 컬렉션하기 전까지 보관하는
      기간입니다. 예: `168h`, `30m`.
  prefetch:
    name: 이미지 미리 받기
    description: >-
      시작 시 캐시에 미리 받아둘 이미지 목록입니다. 각 항목은 레지스트리
      호스트로 시작해야 합니다. 예: `ghcr.io/home-assistant/amd64-base:latest`,
      `docker.io/library/alpine:latest`. 실패해도 로그만 남기고 건너뛰며
      시작을 막지 않습니다.
