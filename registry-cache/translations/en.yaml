---
configuration:
  docker_enabled:
    name: Enable docker.io cache
    description: >-
      Run a pull-through cache for docker.io (registry-1.docker.io),
      reachable at `docker-cache.local:5000` — see DOCS.md for client setup.
  docker_cache_ttl:
    name: docker.io cache TTL
    description: >-
      How long a cached docker.io blob/manifest is kept before garbage
      collection, e.g. `168h` or `30m`.
  ghcr_enabled:
    name: Enable ghcr.io cache
    description: >-
      Run a pull-through cache for ghcr.io, reachable at
      `ghcr-cache.local:5000` — see DOCS.md for client setup.
  ghcr_cache_ttl:
    name: ghcr.io cache TTL
    description: >-
      How long a cached ghcr.io blob/manifest is kept before garbage
      collection, e.g. `168h` or `30m`.
  prefetch:
    name: Prefetch images
    description: >-
      Image refs to warm into the cache at startup, each starting with the
      registry host, e.g. `ghcr.io/home-assistant/amd64-base:latest` or
      `docker.io/library/alpine:latest`. Best-effort — a failed ref is
      logged and skipped, never blocks startup.
