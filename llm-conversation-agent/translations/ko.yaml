---
configuration:
  base_url:
    name: 업스트림 Base URL
    description: >-
      OpenAI 호환 base URL (예: https://api.openai.com/v1,
      https://openrouter.ai/api/v1, http://my-llm:8000/v1). 에이전트가
      chat/completions 호출을 이 주소로 보냅니다.
  api_key:
    name: API 키
    description: >-
      Authorization 헤더(Bearer <key>)로 전송됩니다. 업스트림이 인증을
      요구하지 않으면 비워 두세요.
  model:
    name: 모델
    description: >-
      /chat/completions에 전달할 모델 식별자. 가정 제어를 위해서는
      function calling(tools)을 지원하는 모델이어야 합니다.
  request_timeout:
    name: 요청 타임아웃 (초)
    description: >-
      업스트림 read 타임아웃. 느린 백엔드의 긴 응답이 기본값을 초과할 수
      있습니다 — 응답이 중간에 끊기면 늘리세요.
  verify_ssl:
    name: TLS 인증서 검증
    description: >-
      모든 outbound HTTP (LLM, embedding, MCP, skill_urls)에 대해 TLS
      인증서 검증. 기본 활성화. 자체 서명된 인증서를 쓰는 신뢰된 로컬
      self-hosted 엔드포인트에만 비활성화 — 글로벌 스위치라 엔드포인트별
      override 없음.
  max_tool_iterations:
    name: 최대 tool 반복 횟수
    description: >-
      한 사용자 발화에서 tool→LLM→tool 왕복을 몇 번까지 허용할지 한도.
      모델이 같은 질의를 무한 루프 도는 사고를 방지합니다.
  history_turns:
    name: 대화 이력 턴 수
    description: >-
      대화당 유지할 과거 사용자+어시스턴트 턴 수. 높일수록 모델이 더
      많은 맥락을 보지만 요청당 토큰 비용이 증가합니다. 0이면 멀티턴
      메모리 비활성화.
  languages:
    name: 광고할 언어 (ISO 코드)
    description: >-
      이 에이전트가 Wyoming Info에 광고할 언어 목록. 비워두면 일반적인
      언어 기본 세트를 광고 — LLM은 다국어 처리가 가능하므로 여기에 너무
      적게 적으면 어떤 Assist 파이프라인이 이 에이전트로 라우팅될지만
      제한됩니다.
  extra_headers:
    name: 추가 업스트림 헤더
    description: >-
      모든 업스트림 호출에 추가할 HTTP 헤더. OpenRouter 랭킹용 헤더
      (HTTP-Referer, X-Title)나 커스텀 인증 등에 유용합니다.
  ha_mcp_enabled:
    name: HA Model Context Protocol Server 사용
    description: >-
      HA의 내장 mcp_server 통합으로 HA tool과 entity overview를 위임합니다.
      기본 활성화 — addon 안에서 자동으로 동작 (supervisor proxy +
      SUPERVISOR_TOKEN). HA 없이 agent만 돌릴 때만 비활성화하세요. 비활성화하면
      HA-측 tool이 LLM에 안 보입니다. HA 내부 자동화는 HA의 configuration.yaml에
      `intent_script:`로 정의하면 mcp_server를 통해 자동으로 tool로 노출됩니다.
  mcp_servers:
    name: MCP 서버 (원격, HTTP/SSE)
    description: >-
      부팅 시 연결할 원격 MCP(Model Context Protocol) 서버. 각 서버의
      tool이 LLM에 mcp_<server>_<tool> 이름으로 노출됩니다. 코드 작성
      없이 memory / embedding / filesystem / GitHub 등을 붙일 때 사용.
      transport 기본값은 streamable_http(현행 spec); 레거시 서버는
      transport=sse로 지정. ◆ Headers: bearer 인증이면
      `name: Authorization` / `value: Bearer <token>`, 또는 해당 MCP
      서버가 요구하는 다른 header/value 형식대로 추가.
  embedding_base_url:
    name: 임베딩 Base URL (선택)
    description: >-
      OpenAI 호환 /embeddings 엔드포인트. 비워두면 chat base_url 재사용
      (OpenAI / Ollama / OpenRouter 등에서 동작). chat과 임베딩이 다른
      서버에 있을 때만 명시 (예: vLLM은 인스턴스당 task 1개).
  embedding_api_key:
    name: 임베딩 API 키 (선택)
    description: >-
      임베딩 endpoint용 API 키. 비워두면 chat api_key 재사용.
  embedding_model:
    name: 임베딩 모델
    description: >-
      임베딩 모델 이름 (예: text-embedding-3-small, nomic-embed-text,
      BAAI/bge-small-en-v1.5). 비워두면 임베딩 기반 tool 필터링 자체가
      비활성화됩니다.
  tool_filter_top_k:
    name: Tool 필터 — top K
    description: >-
      0보다 크고 embedding_model이 설정되어 있으면, 매 턴마다 사용자
      transcript와 cosine 유사도 상위 K개 비-메타 tool만 LLM에
      전송합니다. 기본 20 — 일반 음성 요청에 충분히 넉넉합니다.
      MCP 카탈로그가 매우 큰 환경이면 5–10으로 조정하세요. 메타 툴
      (skill_* / memory_* / working_memory_* / journal_*)은 항상
      포함되며 예산을 차지하지 않습니다. 비-메타 tool 총 개수가 K
      이하이거나 embedding_model이 비어 있으면 필터가 자동 우회됩니다.
      0이면 필터링 완전 비활성화.
  ha_tools_mode:
    name: HA tool 필터 모드
    description: >-
      HA mcp_server tool이 tool_filter_top_k와 어떻게 상호작용할지.
      ◆ always (기본): HA tool은 필터를 무조건 통과 — 매 턴 LLM의
      tools 배열이 안정적으로 유지되어 upstream prompt cache
      (OpenAI / vLLM APC) 적중률이 높음. 비용/latency 안정성 우선
      시 추천. ◆ embedding: HA tool도 top-K 점수 매기기에 포함 —
      노출 entity가 많은 환경(50+)에서 토큰 절약. 단 top-K가 매 턴
      바뀌면 prompt cache가 무효화됨. cache 적중보다 토큰 절감이
      더 중요한 환경에 적합. tool_filter_top_k > 0일 때만 의미
      있음. 임베딩 실패 fallback: 그 턴의 HA tool은 전부 통과
      (include-all) — WARNING 로그 출력.
  skills_enabled:
    name: Skill 활성화
    description: >-
      호스트의 /addon_configs/{repo}_llm_conversation_agent/skills/<slug>/SKILL.md
      (= 컨테이너 안 /config/skills/<slug>/SKILL.md)에서
      [agentskills.io](https://agentskills.io) 포맷 Skill을 등록합니다.
      Addon이 첫 부팅 시 디렉토리를 자동 생성. Skill은 모듈식
      capability 패키지 — description + instructions + 옵션 도구
      whitelist. LLM이 list_skills / load_skill / unload_skill 메타
      도구로 필요시 활성화 (progressive disclosure), 활성화된 skill의
      allowed-tools가 매 턴 tools 배열에 추가됩니다. 끄면 디렉토리
      스캔 자체를 건너뜁니다. 잘못된 SKILL.md는 WARNING 로그 후
      skip — addon이 crash하지 않습니다.
  skill_urls:
    name: URL에서 Skill 자동 다운로드
    description: >-
      Addon 시작 시 다운로드할 skill URL 목록. 각 항목은 GitHub repo
      URL(https://github.com/user/repo, 선택적 `@ref` 로 브랜치/태그/
      커밋) 또는 직접 `.tar.gz` / `.tgz` / `.zip` archive URL.
      다운로드 → 추출 → SKILL.md를 포함한 각 디렉토리를
      /config/skills/<slug>/ 에 복사. 각 URL의 upstream 식별자
      (commit SHA / ETag)를 /data/skill_install_state.json에 기록,
      변경 없으면 다음 재시작에 다시 안 받음. 변경되면 해당 skill
      폴더 덮어씀 — 자동 다운로드 대상 skill은 로컬에서 편집하지
      말 것. 네트워크 오류는 URL 단위로 WARNING 로그 후 무시 (addon
      startup은 절대 막지 않음).
  memory_enabled:
    name: 사용자별 메모리 활성화
    description: >-
      대화 너머로 사실을 마크다운으로 영구 저장합니다. 호스트의
      /addon_configs/{repo}_llm_conversation_agent/memory/ (= 컨테이너
      안 /config/memory/) 아래에 보관. LLM은 memory_save /
      memory_read / memory_delete 메타 도구를 받고, MEMORY.md 인덱스가
      시스템 프롬프트에 포함됩니다. HA 음성 위성이
      context["user_id"]를 전달하기 시작하는 HA 2026.6.0+에서는
      사용자별로 memory/users/<user_id>/ 버킷이 분리되고, 그 이전
      HA에서는 모두 memory/shared/를 공유합니다. 끄면 메모리 자체를
      건너뜁니다 (도구 숨김, 파일시스템 손대지 않음).
  metrics_enabled:
    name: Prometheus /metrics 엔드포인트
    description: >-
      별도 HTTP 포트에 Prometheus 포맷 메트릭 노출: 요청 수, prompt/completion
      토큰, 응답 시간, source(HA / external MCP / custom HTTP)별 tool 호출
      수, embedding 호출 수, 활성 대화 수. HA prometheus 통합 또는 임의
      Prometheus 서버에서 scrape.
  metrics_port:
    name: /metrics 포트
    description: >-
      Prometheus /metrics 엔드포인트 TCP 포트. 기본 9099.
  debug_logging:
    name: 디버그 로깅
    description: >-
      DEBUG 레벨 로그 출력 (transcript, tool call, tool result 포함).
network:
  10500/tcp: Wyoming conversation agent (HA가 자동 디스커버리)
  9099/tcp: Prometheus /metrics 엔드포인트 (text-format)
