---
configuration:
  base_url:
    name: Upstream base URL
    description: >-
      OpenAI-compatible base URL (e.g. https://api.openai.com/v1,
      https://openrouter.ai/api/v1, http://my-llm:8000/v1). The agent
      sends chat/completions calls here.
  api_key:
    name: API key
    description: >-
      Sent as the Authorization header (Bearer <key>). Leave blank for
      upstreams that don't require auth.
  model:
    name: Model
    description: >-
      Model identifier passed to /chat/completions. Must support
      function calling (tools) for home control to work.
  request_timeout:
    name: Request timeout (seconds)
    description: >-
      Upstream read timeout. Long replies from slow backends can exceed
      the default — bump this if responses cut off.
  verify_ssl:
    name: Verify TLS certificates
    description: >-
      Verify TLS certs on every outbound HTTP call (LLM, embedding,
      MCP, skill_urls). Default on. Turn OFF only for trusted local
      self-hosted endpoints with self-signed certs — this is a global
      switch with no per-endpoint override.
  max_tool_iterations:
    name: Max tool iterations
    description: >-
      Safety cap on how many tool→LLM→tool round-trips one user turn
      can run before the agent gives up. Prevents runaway models from
      looping forever on the same query.
  history_turns:
    name: Conversation history turns
    description: >-
      How many past user+assistant turns to keep per conversation.
      Higher values give the model more context but cost more tokens
      per request. Set to 0 to disable multi-turn memory.
  languages:
    name: Advertised languages (ISO codes)
    description: >-
      Languages this agent advertises in its Wyoming Info. Leave empty
      to advertise a broad default set of common languages — LLMs are
      multilingual, so listing too few here only limits which Assist
      pipelines will route to this agent.
  extra_headers:
    name: Extra upstream headers
    description: >-
      Extra HTTP headers added to every upstream call. Useful for
      OpenRouter ranking (HTTP-Referer, X-Title) or custom auth.
  ha_mcp_enabled:
    name: Use HA's Model Context Protocol Server
    description: >-
      Delegate HA tools and entity overview to HA's built-in mcp_server
      integration. Default on — works automatically inside the addon
      (supervisor proxy + SUPERVISOR_TOKEN). Turn off only if you run
      this agent without Home Assistant; then no HA-side tools are
      visible to the LLM. For HA-internal automations, define
      `intent_script:` in HA's configuration.yaml — they appear as
      tools through mcp_server automatically.
  mcp_servers:
    name: MCP servers (remote, HTTP/SSE)
    description: >-
      Remote MCP (Model Context Protocol) servers to connect to on
      startup. Each server's tools become callable by the LLM as
      mcp_<server>_<tool>. Use this to plug in memory, embeddings,
      filesystem, GitHub, etc. without writing custom code. Transport
      defaults to streamable_http (current spec); set transport=sse for
      legacy servers. ◆ Headers: add entries with `name: Authorization`
      and `value: Bearer <token>` for bearer auth, or whatever
      header/value scheme your MCP server requires.
  embedding_base_url:
    name: Embedding base URL (optional)
    description: >-
      OpenAI-compatible /embeddings endpoint. Leave blank to reuse the
      chat base_url (works for OpenAI / Ollama / OpenRouter etc.); set
      explicitly when chat and embedding live on different servers
      (typical for vLLM, where each instance serves one task).
  embedding_api_key:
    name: Embedding API key (optional)
    description: >-
      API key for the embedding endpoint. Leave blank to reuse the chat
      api_key.
  embedding_model:
    name: Embedding model
    description: >-
      Embedding model name (e.g. text-embedding-3-small,
      nomic-embed-text, BAAI/bge-small-en-v1.5). Leave blank to disable
      embedding-based tool filtering entirely.
  tool_filter_top_k:
    name: Tool filter — top K
    description: >-
      When > 0 AND embedding_model is set, each turn only the K
      most-relevant non-meta tools (by cosine similarity to the user's
      transcript) are sent to the LLM. Default 20 — generous for
      typical voice requests; reduce to 5–10 for very large MCP
      catalogs. Meta tools (skill_* / memory_* / working_memory_* /
      journal_*) are always included free of the budget. The filter
      auto-bypasses when the total non-meta tool count is already ≤K
      or when embedding_model is empty. 0 disables filtering entirely.
  ha_tools_mode:
    name: HA tools filter mode
    description: >-
      How HA mcp_server tools interact with tool_filter_top_k. ◆ always
      (default): HA tools always pass the filter — keeps the LLM-side
      tools array constant across turns so the upstream's prompt cache
      (OpenAI / vLLM APC) keeps hitting. Best for stable cost/latency.
      ◆ embedding: HA tools also go through top-K scoring — saves
      tokens when you have many exposed entities (50+) but invalidates
      the prompt cache whenever the top-K shifts. Best when token
      budget dominates cache savings. Only meaningful when
      tool_filter_top_k > 0. Embedding-failure fallback: HA tools that
      can't be embedded this turn pass through (include-all) — a
      WARNING is logged.
  skills_enabled:
    name: Enable Skills
    description: >-
      Register [agentskills.io](https://agentskills.io)-format Skills
      from /addon_configs/{repo}_llm_conversation_agent/skills/<slug>/SKILL.md
      on the host (= /config/skills/<slug>/SKILL.md inside the
      container). The addon auto-creates the directory on first boot.
      Skills are modular capability packages — description +
      instructions + optional tool whitelist. The LLM activates them
      on demand via list_skills / load_skill / unload_skill meta-tools
      (progressive disclosure), and their allowed-tools join the
      per-turn tools array while loaded. Off skips the directory scan
      entirely. Bad SKILL.md files log WARNING and are skipped — the
      addon never crashes on a malformed skill.
  skill_urls:
    name: Auto-fetch skills from URLs
    description: >-
      List of URLs to fetch skills from at startup. Each entry is either
      a GitHub repo URL (https://github.com/user/repo, optional `@ref`
      for branch / tag / commit) or a direct `.tar.gz` / `.tgz` / `.zip`
      archive URL. The addon downloads, extracts, and copies every
      SKILL.md-containing directory into /config/skills/<slug>/. Upstream
      identifiers (commit SHA / ETag) are tracked in
      /data/skill_install_state.json so unchanged URLs are free across
      restarts. When upstream DOES change, the matching skill folder is
      overwritten — do not local-edit skills you also auto-fetch.
      Network errors per URL log WARNING and never block startup.
  memory_enabled:
    name: Enable per-user memory
    description: >-
      Persist facts across conversations in plain markdown under
      /addon_configs/{repo}_llm_conversation_agent/memory/ (=
      /config/memory/ inside the container). The LLM gets memory_save
      / memory_read / memory_delete meta-tools and a MEMORY.md index
      in the system prompt. When HA's voice satellite delivers
      context["user_id"] (HA 2026.6.0+), each user gets their own
      bucket at memory/users/<user_id>/; on older HA everyone shares
      memory/shared/. Off skips memory entirely (tools hidden, no
      filesystem touched).
  metrics_enabled:
    name: Prometheus /metrics endpoint
    description: >-
      Expose Prometheus-format metrics on a separate HTTP port: request
      counts, prompt/completion tokens, durations, tool-call counts by
      source (HA / external MCP / custom HTTP), embedding calls, and
      active conversation count. Scrape from HA's prometheus
      integration or any Prometheus server.
  metrics_port:
    name: /metrics port
    description: >-
      TCP port for the Prometheus /metrics endpoint. Default 9099.
  debug_logging:
    name: Debug logging
    description: >-
      Print DEBUG-level messages to the app log, including each
      transcript, tool call, and tool result.
network:
  10500/tcp: Wyoming conversation agent (auto-discovered by HA)
  9099/tcp: Prometheus /metrics endpoint (text-format)
