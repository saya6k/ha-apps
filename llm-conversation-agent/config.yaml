---
version: "1.14.5"
slug: llm_conversation_agent
name: LLM Conversation Agent
description: >-
  Wyoming conversation agent backed by any OpenAI-compatible LLM. Delegates
  Home Assistant tool execution to HA's built-in mcp_server integration, so
  exposed entities, intents, and prompt context all come straight from HA.
url: https://github.com/saya6k/ha-llm-conversation-agent
arch:
  - amd64
  - aarch64
init: false
discovery:
  - wyoming
homeassistant_api: true
# Host side:      /addon_configs/{repo}_llm_conversation_agent/
# Container side: /config/
# Users place skill folders on the HOST under
#     /addon_configs/{repo}_llm_conversation_agent/skills/<slug>/SKILL.md
# the addon reads them at the equivalent in-container path
#     /config/skills/<slug>/SKILL.md
# See notes/skills.md for the agentskills.io format.
map:
  - addon_config:rw
# bubblewrap needs SYS_ADMIN to create the user/mount namespaces it uses to
# sandbox skill scripts (see notes/sandbox.md). Without this the
# run_skill_script meta-tool returns an error and skill scripts can't run;
# the rest of the addon (LLM loop, HA mcp_server, skill instructions
# without scripts) keeps working.
privileged:
  - SYS_ADMIN
# Use the custom AppArmor profile at `apparmor.txt` at the repo root.
# The Supervisor-auto-generated profile blocks bwrap's
# `mount(MS_SLAVE|MS_REC)` even with CAP_SYS_ADMIN ("Failed to make /
# slave: Permission denied") — see notes/sandbox.md. The custom profile
# allows the broad mount/pivot_root/ptrace primitives bwrap needs while
# the *inner* bwrap argv (--unshare-{net,user,ipc,uts,cgroup}, seccomp
# denylist, ro-bind /usr, rlimits) does the actual confinement of
# skill scripts. Keeping AppArmor on (vs `apparmor: false`) is worth
# +1 security-rating point.
apparmor: true
options:
  base_url: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"
  request_timeout: 60
  verify_ssl: true
  max_tool_iterations: 8
  history_turns: 6
  languages: []
  extra_headers: []
  ha_mcp_enabled: true
  mcp_servers: []
  embedding_base_url: ""
  embedding_api_key: ""
  embedding_model: ""
  tool_filter_top_k: 20
  ha_tools_mode: always
  skills_enabled: true
  skill_urls: []
  memory_enabled: true
  metrics_enabled: true
  metrics_port: 9099
  debug_logging: false
schema:
  base_url: url
  api_key: password
  model: str
  request_timeout: int(5,600)
  # Verify upstream TLS certificates. Turn OFF only for local self-hosted
  # LLM endpoints with self-signed certs on a trusted network. Disabling
  # applies to all outbound HTTP (LLM, embedding, MCP, skill_urls) —
  # there is no per-endpoint override.
  verify_ssl: bool
  max_tool_iterations: int(1,20)
  history_turns: int(0,20)
  languages:
    - str
  extra_headers:
    - name: str
      value: password
  # Delegate Home Assistant tools and prompt to HA's built-in mcp_server
  # integration. Default true (works automatically inside an addon via the
  # supervisor proxy + SUPERVISOR_TOKEN). Set to false only if you run
  # the agent without HA — exposes no HA-side tools to the LLM.
  ha_mcp_enabled: bool
  # External MCP servers (memory, vector search, GitHub, etc.). Their tools
  # are discovered once at startup and exposed as `mcp_<server>_<tool>`.
  mcp_servers:
    - name: str
      url: url
      transport: list(streamable_http|sse)?
      headers:
        - name: str
          value: password
  # Embedding-based tool filtering (OpenAI-compatible /embeddings).
  # Leave embedding_base_url/api_key blank to reuse the chat ones; set
  # them when chat and embedding live on different servers (typical for
  # vLLM, where one instance = one task).
  embedding_base_url: str?
  embedding_api_key: password?
  embedding_model: str?
  tool_filter_top_k: int(0,200)
  # How HA mcp_server tools interact with tool_filter_top_k.
  #   always    — HA tools always pass the filter (default). Keeps the
  #               LLM-side `tools:` array constant across turns so the
  #               upstream's prompt cache (OpenAI / vLLM APC) keeps
  #               hitting. Best when you want stable cost/latency.
  #   embedding — HA tools also go through top-K embedding scoring. Saves
  #               tokens when you have many exposed entities (50+) but
  #               invalidates the prompt cache whenever the top-K shifts
  #               between turns. Best when token budget dominates cache.
  # Only meaningful when tool_filter_top_k > 0.
  ha_tools_mode: list(always|embedding)
  # Skill folders in agentskills.io standard format. Loaded at startup
  # from /config/skills/ inside the container (= HOST
  # /addon_configs/{repo}_llm_conversation_agent/skills/). The s6 run
  # script creates the directory on first launch so users can drop
  # <slug>/SKILL.md files without manual setup. Three meta-tools
  # (list_skills / load_skill / unload_skill, plus run_skill_script
  # when bubblewrap is available) drive progressive disclosure.
  # Off = skip the directory scan entirely.
  skills_enabled: bool
  # Skills to auto-fetch into /config/skills/ at addon startup. Each
  # entry is either a GitHub repo URL (`https://github.com/user/repo`,
  # optional `@ref` for branch / tag / commit) or a direct
  # `.tar.gz` / `.tgz` / `.zip` archive URL. The addon records each
  # URL's upstream commit SHA / ETag in
  # /data/skill_install_state.json and only re-extracts when the
  # upstream actually changes — so unchanged URLs are free across
  # restarts, and your local edits to a skill folder survive as long as
  # upstream hasn't moved. When upstream DOES change, the folder is
  # overwritten (so don't local-edit skills you also auto-fetch).
  # Network errors per URL are logged WARNING and never block startup.
  skill_urls:
    - url
  # Per-user persistent memory under /config/memory/. The LLM gets
  # memory_save / memory_read / memory_delete meta-tools and a
  # MEMORY.md index in the system prompt. When HA's voice satellite
  # delivers context["user_id"] (HA 2026.6.0+), each user gets their
  # own bucket; on older HA everyone shares /config/memory/shared/.
  # Off = skip memory entirely (tools hidden, no filesystem touched).
  memory_enabled: bool
  # Prometheus /metrics HTTP endpoint on `metrics_port`. Compatible with
  # HA's built-in `prometheus` integration as a scrape target.
  metrics_enabled: bool
  metrics_port: port
  debug_logging: bool
ports:
  "10500/tcp": null
  "9099/tcp": 9099
ports_description:
  "10500/tcp": Wyoming conversation agent (auto-discovered by HA)
  "9099/tcp": Prometheus /metrics endpoint (text-format)
homeassistant: 2026.3.0
