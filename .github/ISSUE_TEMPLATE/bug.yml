name: Bug report
description: Something in one of the add-ons is broken or misbehaving.
title: "[bug]: "
labels:
  - "type:fix"
  - "needs:triage"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the
        sections below — incomplete reports may be closed with `needs:repro`.

  - type: dropdown
    id: addon
    attributes:
      label: Add-on
      description: Which add-on is affected?
      options:
        - livekit-wakeword
        - nemotron-asr-c
        - nemo-asr-cpp
        - supertonic
        - voiceprint
        - wardrowbe
        - zensical
        - otelcol
        - transcribe-cpp
        - crw
        - repository tooling (CI / docs / labels)
    validations:
      required: true

  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      description: Shown in Settings → Add-ons → <add-on> in Home Assistant.
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      description: Settings → About.
      placeholder: "e.g. 2026.5.2"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Add-on log (Settings → Add-ons → <add-on> → Log). Trim to the relevant window.
      render: shell

  - type: textarea
    id: options
    attributes:
      label: Add-on configuration
      description: Paste the YAML/options block from the Configuration tab. Redact tokens / passwords.
      render: yaml
