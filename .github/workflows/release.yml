---
name: Release

# Dev-first flow: release-please watches `dev` and opens its release PRs against
# `dev`. `main` is the released/stable branch, advanced only by an explicit,
# user-approved `dev -> main` promotion (see .agents/workflows/app-dev-pr.md).
# This file triggers on `dev` only, so a promotion push to `main` does not cut a
# release on `main`.
# yamllint disable-line rule:truthy
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Only one release run at a time — release-please does not handle racing
# pushes well; later runs supersede earlier ones.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
          # Cut release PRs against `dev`, not the default branch (`main`).
          target-branch: dev
          # Use a PAT/App token (not the default GITHUB_TOKEN): GitHub does not
          # trigger workflows from GITHUB_TOKEN-authored events, so the release
          # PR would get no CI and the tags release-please pushes would not
          # trigger build.yml. With a PAT the `<slug>-v<version>` tags fire
          # build.yml's `push: tags` directly — exactly once per add-on — so no
          # manual dispatch is needed. Create a fine-grained PAT secret
          # RELEASE_PLEASE_TOKEN (Contents + Pull requests: write); falls back
          # to GITHUB_TOKEN if unset.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
