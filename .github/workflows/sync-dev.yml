---
name: Sync dev from main

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync-dev:
    name: Fast-forward dev to main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Fast-forward dev to main if behind
        run: |
          git switch dev
          MAIN=$(git rev-parse origin/main)
          DEV=$(git rev-parse HEAD)
          BASE=$(git merge-base origin/main HEAD)
          if [ "$MAIN" = "$DEV" ]; then
            echo "Already in sync."
          elif [ "$BASE" = "$DEV" ]; then
            # dev is behind main (main is ahead) — FF
            git merge --ff-only origin/main
            git push origin dev
            echo "dev synced to $(git rev-parse --short HEAD)."
          elif [ "$BASE" = "$MAIN" ]; then
            echo "dev is ahead of main — nothing to do."
          else
            echo "dev has diverged from main — skipping auto-sync."
            echo "Run 'git merge origin/main' on dev before next promotion."
          fi
