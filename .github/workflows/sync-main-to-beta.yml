---
name: Sync main to beta

# Keeps `beta` from drifting off `main` for shared infra (workflows, docs,
# .gitignore, CI config, etc.) that has nothing to do with the beta channel.
# repository.yaml's beta branding is the one intentional divergence -- main
# never touches that file post-fork, so a plain merge never conflicts on it,
# and guard-beta-repository.yml (a required check on beta) still verifies
# the branding survives every merge here.
#
# App content that legitimately differs between branches (rc versions,
# beta-only catalog entries) can still conflict with an app added on both
# branches independently -- when that happens this job's merge step fails
# and no PR is opened; resolve by hand:
#   git checkout beta && git merge main   # fix conflicts, commit, push, PR
# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: sync-main-to-beta
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Merge main into beta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: beta
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Check for drift
        id: check
        run: |
          set -euo pipefail
          git fetch origin main
          if git merge-base --is-ancestor origin/main HEAD; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge main and open PR
        if: steps.check.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync/main-to-beta-$(date +%Y%m%d%H%M%S)"
          git checkout -b "${BRANCH}"
          git merge origin/main --no-edit
          git push origin "${BRANCH}"
          BODY="Automated merge of \`main\` into \`beta\` to keep shared infra"
          BODY+=" from drifting. repository.yaml's beta branding is untouched"
          BODY+=" (main doesn't modify that file); guard-beta-repository.yml"
          BODY+=" re-verifies it anyway."
          PR=$(gh pr create \
            --base beta \
            --head "${BRANCH}" \
            --title "chore(repo): sync main into beta" \
            --body "${BODY}" \
          )
          gh pr merge "$PR" --merge --auto --delete-branch
