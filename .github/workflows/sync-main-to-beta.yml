---
name: Sync main to beta

# Keeps shared infra (workflows, docs, lint config, etc.) from drifting
# between main and beta. Copies an explicit path allowlist from main's tree
# onto beta -- never a branch merge -- so this can never conflict with the
# per-app content (config.yaml, CHANGELOG.md) that main and beta legitimately
# diverge on; sync-app-version.yml now syncs app content to both branches
# directly on every release, so no reconciliation is needed here.
# repository.yaml (the beta branding) and every app directory are
# deliberately excluded from SHARED_PATHS; guard-beta-repository.yml still
# verifies the branding survives every merge here.
#
# New shared-infra files/dirs at repo root need to be added to SHARED_PATHS
# below -- they aren't picked up automatically.
# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: sync-main-to-beta
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  SHARED_PATHS: >-
    .agents .claude .editorconfig .gitattributes .github .gitignore
    .hadolint.yaml .markdownlint.yaml .shellcheckrc .yamllint
    AGENTS.md CODE_OF_CONDUCT.md CONTRIBUTING.md LICENSE README.md
    SECURITY.md

jobs:
  sync:
    name: Copy shared infra from main to beta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: beta
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Copy shared-infra paths from main and open PR if changed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          git fetch origin main
          # shellcheck disable=SC2086
          git checkout origin/main -- $SHARED_PATHS

          if git diff --quiet --cached && git diff --quiet; then
            echo "No shared-infra drift, nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sync/main-to-beta-$(date +%Y%m%d%H%M%S)"
          git checkout -b "${BRANCH}"
          # shellcheck disable=SC2086
          git add $SHARED_PATHS
          git commit -m "chore(repo): sync shared infra from main to beta"
          git push origin "${BRANCH}"
          PR=$(gh pr create \
            --base beta \
            --head "${BRANCH}" \
            --title "chore(repo): sync main into beta" \
            --body "Automated copy of shared-infra paths from \`main\`.
          App content and \`repository.yaml\` are untouched." \
          )
          gh pr merge "$PR" --merge --auto --delete-branch
