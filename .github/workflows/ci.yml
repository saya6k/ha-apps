---
name: CI

# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ---------------------------------------------------------------------
  # Detect which add-on directories changed and emit a JSON array that
  # downstream matrix jobs consume. We use paths-filter (not git diff) so
  # the first-PR / force-push cases work without explicit fetch-depth
  # juggling. The filter names must match the directory names exactly —
  # they become matrix.addon values.
  # ---------------------------------------------------------------------
  changes:
    name: Detect changed add-ons
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v7

      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            livekit-wakeword:
              - 'livekit-wakeword/**'
            nemotron-asr-c:
              - 'nemotron-asr-c/**'
            nemo-asr-cpp:
              - 'nemo-asr-cpp/**'
            supertonic:
              - 'supertonic/**'
            voiceprint:
              - 'voiceprint/**'
            wardrowbe:
              - 'wardrowbe/**'
            zensical:
              - 'zensical/**'
            otelcol:
              - 'otelcol/**'

      # Same per-add-on filters but excluding docs (*.md). With
      # predicate-quantifier 'every', an add-on counts only when a changed file
      # matches '<addon>/**' AND is not a markdown file — so docs-only changes
      # yield an empty list and the heavy image build is skipped. Lint jobs keep
      # using the docs-inclusive `addons` output above.

  # ---------------------------------------------------------------------
  # Official Home Assistant add-on lint — validates config.yaml schema,
  # image references, slug rules, etc. This is the same check the HA
  # store applies. Path input is the key to monorepo support.
  # ---------------------------------------------------------------------
  lint-addon:
    name: Add-on lint (${{ matrix.addon }})
    needs: changes
    if: ${{ needs.changes.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v7

      - name: Home Assistant Add-on Lint
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ matrix.addon }}"

  # ---------------------------------------------------------------------
  # yamllint over the changed add-on (its own config.yaml, build.yaml,
  # translations/*.yaml, s6 yaml). The official reusable workflow runs
  # this separately from the add-on linter, so we do too.
  # ---------------------------------------------------------------------
  lint-yaml:
    name: yamllint (${{ matrix.addon }})
    needs: changes
    if: ${{ needs.changes.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v7

      - uses: frenck/action-yamllint@v1
        with:
          path: ${{ matrix.addon }}


  # ---------------------------------------------------------------------
  # shellcheck the add-on's rootfs/ shell scripts (s6 run/finish files
  # plus any *.sh under rootfs/). Cleanly skips add-ons without rootfs/.
  # ---------------------------------------------------------------------
  lint-shell:
    name: shellcheck (${{ matrix.addon }})
    needs: changes
    if: ${{ needs.changes.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v7

      - name: Collect shell scripts
        id: collect
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find "${{ matrix.addon }}/rootfs" \
            -type f \( -name '*.sh' -o -name 'run' -o -name 'finish' \) 2>/dev/null || true)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No shell scripts under ${{ matrix.addon }}/rootfs"
          else
            printf '%s\n' "${FILES[@]}" > /tmp/shellcheck-targets
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: shellcheck
        if: steps.collect.outputs.found == 'true'
        run: |
          set -euo pipefail
          mapfile -t FILES < /tmp/shellcheck-targets
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable \
            --severity=warning --shell=bash "${FILES[@]}"

  # ---------------------------------------------------------------------
  # Unicode whitespace lint — NBSP, thin space, etc. silently break bashio
  # config parsing (returns "" instead of the configured value). This is
  # invisible in editors and produces no parse error, making it very hard
  # to debug without an explicit CI check.
  # ---------------------------------------------------------------------
  lint-unicode:
    name: Unicode whitespace (${{ matrix.addon }})
    needs: changes
    if: ${{ needs.changes.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v7

      - name: Check for Unicode whitespace
        run: |
          set -euo pipefail
          ADDON="${{ matrix.addon }}"
          FOUND=$(find "$ADDON" -type f \( \
            -name '*.yaml' -o -name '*.yml' -o \
            -name '*.py'   -o -name '*.sh'  -o \
            -name 'run'    -o -name 'finish' \
          \) -print0 \
            | xargs -0 --no-run-if-empty grep -Pln \
              '[\x{a0}\x{2002}-\x{200b}\x{202f}\x{205f}\x{3000}]' \
              2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Unicode whitespace (e.g. NBSP U+00A0) found in:"
            echo "$FOUND"
            echo "Replace with regular ASCII spaces (U+0020)."
            exit 1
          fi
          echo "OK — no Unicode whitespace"

  # ---------------------------------------------------------------------
  # markdownlint — checks user-facing *.md files (README, DOCS, etc.) in
  # the changed add-on. AI agent docs (AGENTS.md, CLAUDE.md, .agents/,
  # specs/) and CHANGELOG.md (release-please generated) are excluded.
  # ---------------------------------------------------------------------
  lint-markdown:
    name: markdownlint (${{ matrix.addon }})
    needs: changes
    if: ${{ needs.changes.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v7

      - name: Find Markdown files
        id: mdfiles
        run: |
          set -euo pipefail
          COUNT=$(find "${{ matrix.addon }}" -name '*.md' 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Markdown files in ${{ matrix.addon }}, skipping"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${COUNT} Markdown file(s)"
          fi

      - uses: DavidAnson/markdownlint-cli2-action@v23
        if: steps.mdfiles.outputs.found == 'true'
        with:
          globs: |
            ${{ matrix.addon }}/**/*.md
            !${{ matrix.addon }}/CHANGELOG.md
            !${{ matrix.addon }}/AGENTS.md
            !${{ matrix.addon }}/.agents/**
            !${{ matrix.addon }}/specs/**
            !${{ matrix.addon }}/tasks/**
          config: .markdownlint.yaml

  # ---------------------------------------------------------------------
  # Ruff — Python lint for add-ons that contain Python source. Skips
  # add-ons without any .py files so pure-shell add-ons pay no cost.
  # ---------------------------------------------------------------------
  lint-python:
    name: ruff (${{ matrix.addon }})
    needs: changes
    if: ${{ needs.changes.outputs.addons != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.changes.outputs.addons) }}
    steps:
      - uses: actions/checkout@v7

      - name: Find Python files
        id: pyfiles
        run: |
          set -euo pipefail
          COUNT=$(find "${{ matrix.addon }}" -name '*.py' 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python files in ${{ matrix.addon }}, skipping ruff"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found ${COUNT} Python file(s)"
          fi

      - name: Install ruff
        if: steps.pyfiles.outputs.found == 'true'
        run: pip install --quiet ruff

      - name: ruff check
        if: steps.pyfiles.outputs.found == 'true'
        run: ruff check "${{ matrix.addon }}"



  # ---------------------------------------------------------------------
  # Single required-status-check for branch protection. Passes if every
  # downstream lint succeeded OR was cleanly skipped because no add-on
  # directory changed in this push.
  # ---------------------------------------------------------------------
  ci-ok:
    name: CI passed
    if: always()
    needs:
      - changes
      - lint-addon
      - lint-yaml
      - lint-shell
      - lint-unicode
      - lint-markdown
      - lint-python
    runs-on: ubuntu-latest
    steps:
      - name: Verify all lint jobs succeeded (or cleanly skipped)
        run: |
          set -euo pipefail
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          for result in \
            "${{ needs.lint-addon.result }}" \
            "${{ needs.lint-yaml.result }}" \
            "${{ needs.lint-shell.result }}" \
            "${{ needs.lint-unicode.result }}" \
            "${{ needs.lint-markdown.result }}" \
            "${{ needs.lint-python.result }}"; do
            case "$result" in
              success|skipped) ;;
              *) echo "downstream lint failed: $result"; exit 1 ;;
            esac
          done
