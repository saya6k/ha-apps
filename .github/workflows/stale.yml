---
name: Stale

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "27 4 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: stale

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 7
          exempt-issue-labels: "needs:triage,type:feat,pinned,security"
          exempt-pr-labels: "pinned,security"
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >-
            This issue has been inactive for 60 days. If it still matters,
            comment to keep it open; otherwise it will close in 7 days.
          stale-pr-message: >-
            This PR has been inactive for 60 days. Comment or push to keep
            it open; otherwise it will close in 7 days.
