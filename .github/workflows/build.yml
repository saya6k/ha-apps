---
name: Build & publish images

# Build each add-on's per-arch image and push it to GHCR as
# ghcr.io/saya6k/<arch>-addon-<slug>:<version> (+ :latest).
#
# Triggered by the release-please tags (`<slug>-v<version>`) so an image is
# published exactly when an add-on is released. Can also be run by hand.
#
# The Dockerfiles default ARG BUILD_FROM to a multi-arch HA base manifest, so a
# plain `docker buildx --platform linux/<arch>` resolves the right base per
# arch — no build.yaml / home-assistant/builder needed.

# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - "*-v*"
  workflow_dispatch:
    inputs:
      addon:
        description: Add-on slug
        required: true
        type: choice
        options:
          - livekit-wakeword
          - nemotron-asr-c
          - nemo-asr-cpp
          - supertonic
          - voiceprint
          - wardrowbe
          - zensical
      version:
        description: Version (e.g. 0.1.0)
        required: true
        type: string

permissions:
  contents: read
  packages: write

# Per-add-on group so different add-ons build in parallel; only one build
# per add-on runs at a time — a newer release cancels an in-progress build
# of the same add-on (the newer image supersedes the older one).
# Grouped at job level so needs.prepare.outputs.slug is available.

jobs:
  # -------------------------------------------------------------------
  # Resolve slug + version (from the tag or the manual inputs) and read
  # the add-on's arch list from its config.yaml into a matrix.
  # -------------------------------------------------------------------
  prepare:
    name: Resolve target
    runs-on: ubuntu-latest
    outputs:
      slug: ${{ steps.meta.outputs.slug }}
      version: ${{ steps.meta.outputs.version }}
      arches: ${{ steps.meta.outputs.arches }}
      skip: ${{ steps.meta.outputs.skip }}
    steps:
      - uses: actions/checkout@v6

      - id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            slug="${{ inputs.addon }}"
            version="${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"     # e.g. nemo-asr-cpp-v0.1.0
            slug="${tag%-v*}"
            version="${tag##*-v}"
          fi
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          # Only the published add-ons get an image; ignore any stray tag.
          case "$slug" in
            livekit-wakeword|nemotron-asr-c|nemo-asr-cpp|supertonic|voiceprint|wardrowbe|zensical) ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::'$slug' is not a published add-on — skipping image build."
              exit 0
              ;;
          esac

          arches=$(yq -o=json -I=0 '.arch' "$slug/config.yaml")
          echo "arches=$arches" >> "$GITHUB_OUTPUT"
          echo "::notice::Building $slug $version for $arches"

  # -------------------------------------------------------------------
  # One image per arch. The HA supervisor pulls <arch>-addon-<slug>, so
  # we publish separate per-arch images (not a single multi-arch tag).
  # -------------------------------------------------------------------
  build:
    name: ${{ needs.prepare.outputs.slug }} (${{ matrix.arch }})
    needs: prepare
    if: ${{ needs.prepare.outputs.skip != 'true' }}
    concurrency:
      group: build-${{ needs.prepare.outputs.slug }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.prepare.outputs.arches) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: platform
        run: |
          case "${{ matrix.arch }}" in
            amd64)   echo "value=linux/amd64"   >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "value=linux/arm64"   >> "$GITHUB_OUTPUT" ;;
            armv7)   echo "value=linux/arm/v7"  >> "$GITHUB_OUTPUT" ;;
            armhf)   echo "value=linux/arm/v6"  >> "$GITHUB_OUTPUT" ;;
            i386)    echo "value=linux/386"     >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported arch ${{ matrix.arch }}"; exit 1 ;;
          esac

      - uses: docker/build-push-action@v7
        with:
          context: ${{ needs.prepare.outputs.slug }}
          file: ${{ needs.prepare.outputs.slug }}/Dockerfile
          platforms: ${{ steps.platform.outputs.value }}
          push: true
          # Plain image (no attestation manifest) — the HA supervisor pulls a
          # single-platform image by tag, not an OCI index.
          provenance: false
          sbom: false
          tags: |
            ghcr.io/saya6k/${{ matrix.arch }}-addon-${{ needs.prepare.outputs.slug }}:${{ needs.prepare.outputs.version }}
            ghcr.io/saya6k/${{ matrix.arch }}-addon-${{ needs.prepare.outputs.slug }}:latest
