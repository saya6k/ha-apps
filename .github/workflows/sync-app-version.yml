---
name: Sync app version

# A stable release is by definition newer than any rc that preceded it, so
# it's also the newest available beta build -- `app-released` therefore
# fans out to both `main` and `beta`, while `app-released-beta` (an rc)
# only ever targets `beta`. Each target gets its own independent sync run
# (never a git merge between main and beta), so the two branches can carry
# different CHANGELOG.md / config.yaml content without ever needing
# reconciliation.
# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: [app-released, app-released-beta]

permissions:
  contents: write
  pull-requests: write

jobs:
  targets:
    name: Resolve sync targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolve.outputs.targets }}
    steps:
      - id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event.action }}" = "app-released-beta" ]; then
            targets='[{"channel":"beta","base_branch":"beta"}]'
          else
            targets='[{"channel":"stable","base_branch":"main"},{"channel":"beta","base_branch":"beta"}]'
          fi
          echo "targets=${targets}" >> "$GITHUB_OUTPUT"

  sync:
    name: >-
      Sync ${{ github.event.client_payload.app }}
      ${{ github.event.client_payload.version }} (${{ matrix.channel }})
    needs: targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.targets.outputs.targets) }}
    env:
      CHANNEL: ${{ matrix.channel }}
      BASE_BRANCH: ${{ matrix.base_branch }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Install Jinja2
        run: pip install --quiet jinja2

      - name: Sync files from source repo and update CHANGELOG.md
        env:
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import os, re, subprocess, base64, hashlib, urllib.parse
          import jinja2

          app     = os.environ["APP"]
          version = os.environ["VERSION"]
          notes   = os.environ["RELEASE_NOTES"]
          channel = os.environ["CHANNEL"]
          repo    = f"https://github.com/saya6k/ha-app-{app}"
          image   = f"ghcr.io/saya6k/app-{app}"

          # Same URL (+ "#beta" branch fragment for the beta channel) HA
          # Supervisor's own repository-slug hash uses, so the rendered
          # "Show add-on" badge points at the repo the user actually has
          # added (stable ha-apps vs ha-apps#beta) -- see
          # supervisor/store/utils.py::get_hash_from_repository and
          # supervisor/validate.py::RE_REPOSITORY (branch fragment is part
          # of the hashed string, not stripped).
          catalog_url = "https://github.com/saya6k/ha-apps" + ("#beta" if channel == "beta" else "")
          addon_hash = hashlib.sha1(catalog_url.lower().encode()).hexdigest()[:8]
          repository_url_encoded = urllib.parse.quote(catalog_url, safe="")

          def gh_file(path):
              r = subprocess.run(
                  ["gh", "api", f"repos/saya6k/ha-app-{app}/contents/{app}/{path}",
                   "--jq", ".content"],
                  capture_output=True, text=True, check=True,
              )
              return base64.b64decode(r.stdout.strip()).decode()

          def gh_ls(path):
              r = subprocess.run(
                  ["gh", "api", f"repos/saya6k/ha-app-{app}/contents/{app}/{path}",
                   "--jq", ".[].name"],
                  capture_output=True, text=True, check=True,
              )
              return [n for n in r.stdout.strip().splitlines() if n]

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              print(f"  synced {path}")

          # ── README.md: render .README.j2 from source repo ─────────────────
          env = jinja2.Environment(trim_blocks=True, lstrip_blocks=True)
          readme_tmpl = gh_file(".README.j2")
          readme = env.from_string(readme_tmpl).render(
              channel=channel, slug=app,
              addon_hash=addon_hash, repository_url_encoded=repository_url_encoded,
          )
          if not readme.endswith("\n"):
              readme += "\n"
          write(f"{app}/README.md", readme)

          # ── DOCS.md ─────────────────────────────────────────────────────
          write(f"{app}/DOCS.md", gh_file("DOCS.md"))

          # ── translations/* ────────────────────────────────────────────────
          for fname in gh_ls("translations"):
              write(f"{app}/translations/{fname}", gh_file(f"translations/{fname}"))

          # ── optional assets: icon/logo (binary) + apparmor.txt ────────────
          # Self-heals the beta-scaffold gap: a brand-new app's first release
          # can land on a branch it was never manually scaffolded onto, and
          # these files were previously never synced — leaving the beta
          # catalog without icons. Fetched when the source repo has them;
          # never deleted here if the source lacks them.
          def gh_file_optional(path):
              r = subprocess.run(
                  ["gh", "api", f"repos/saya6k/ha-app-{app}/contents/{app}/{path}",
                   "--jq", ".content"],
                  capture_output=True, text=True,
              )
              if r.returncode != 0:
                  return None
              return base64.b64decode(r.stdout.strip())

          for asset in ("icon.png", "logo.png", "apparmor.txt"):
              data = gh_file_optional(asset)
              if data is None:
                  print(f"  {asset}: not in source repo, skipping")
                  continue
              with open(f"{app}/{asset}", "wb") as f:
                  f.write(data)
              print(f"  synced {asset}")

          # ── config.yaml: sync from source, inject version + image ─────────
          cfg = gh_file("config.yaml")
          cfg = re.sub(r"^version:.*$", f"version: {version}", cfg, flags=re.MULTILINE)
          if re.search(r"^image:", cfg, flags=re.MULTILINE):
              cfg = re.sub(r"^image:.*$", f"image: {image}", cfg, flags=re.MULTILINE)
          else:
              cfg = re.sub(r"^(version:[^\n]*\n)", rf"\1image: {image}\n", cfg, flags=re.MULTILINE)
          write(f"{app}/config.yaml", cfg)

          # ── CHANGELOG.md prepend ──────────────────────────────────────────
          # Self-heals a missing file instead of crashing: happens for any
          # app whose very first-ever release lands on a branch it was never
          # manually scaffolded onto (e.g. a brand-new app's first release is
          # a prerelease, so this is the first time it's synced to `beta`).
          cl_path = f"{app}/CHANGELOG.md"
          if os.path.exists(cl_path):
              with open(cl_path) as f:
                  cl = f.read()
          else:
              cl = f"# Changelog\n"
              print(f"  {cl_path} missing, creating stub")
          section = (
              f"## [{version}]({repo}/releases/tag/v{version})\n\n"
              f"{notes.strip()}\n"
          )
          idx = cl.find("\n## [")
          if idx >= 0:
              cl = cl[:idx + 1] + section + "\n" + cl[idx + 1:]
          else:
              cl = cl.rstrip("\n") + "\n\n" + section + "\n"
          with open(cl_path, "w") as f:
              f.write(cl)
          print(f"  prepended to {cl_path}")
          PYEOF

      - name: Open PR and enable auto-merge
        env:
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          # Channel-suffixed: a stable release fans out to both main and
          # beta in parallel matrix legs, so the two need distinct branches.
          BRANCH="sync/${APP}-${VERSION}-${CHANNEL}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${APP}/"
          git commit -m "chore(${APP}): release ${VERSION}"
          git push origin "${BRANCH}"
          BODY="Auto-synced from [ha-app-${APP} v${VERSION}]"
          BODY+="(https://github.com/saya6k/ha-app-${APP}/releases/tag/v${VERSION})."
          PR=$(gh pr create \
            --base "${BASE_BRANCH}" \
            --head "${BRANCH}" \
            --title "chore(${APP}): release ${VERSION}" \
            --body "${BODY}" \
          )
          gh pr merge "$PR" --squash --auto --delete-branch
