---
name: Sync app version

# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: [app-released]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: >-
      Sync ${{ github.event.client_payload.app }}
      ${{ github.event.client_payload.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Sync files from source repo and update CHANGELOG.md
        env:
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          RELEASE_NOTES: ${{ github.event.client_payload.release_notes }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import os, re, subprocess, base64, json

          app     = os.environ["APP"]
          version = os.environ["VERSION"]
          notes   = os.environ["RELEASE_NOTES"]
          repo    = f"https://github.com/saya6k/ha-app-{app}"
          image   = f"ghcr.io/saya6k/app-{app}"

          def gh_file(path):
              r = subprocess.run(
                  ["gh", "api", f"repos/saya6k/ha-app-{app}/contents/{app}/{path}",
                   "--jq", ".content"],
                  capture_output=True, text=True, check=True,
              )
              return base64.b64decode(r.stdout.strip()).decode()

          def gh_ls(path):
              r = subprocess.run(
                  ["gh", "api", f"repos/saya6k/ha-app-{app}/contents/{app}/{path}",
                   "--jq", ".[].name"],
                  capture_output=True, text=True, check=True,
              )
              return [n for n in r.stdout.strip().splitlines() if n]

          def write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              print(f"  synced {path}")

          # ── README.md and DOCS.md ─────────────────────────────────────────
          write(f"{app}/README.md", gh_file("README.md"))
          write(f"{app}/DOCS.md",   gh_file("DOCS.md"))

          # ── translations/* ────────────────────────────────────────────────
          for fname in gh_ls("translations"):
              write(f"{app}/translations/{fname}", gh_file(f"translations/{fname}"))

          # ── config.yaml: sync from source, inject version + image ─────────
          cfg = gh_file("config.yaml")
          cfg = re.sub(r"^version:.*$", f"version: {version}", cfg, flags=re.MULTILINE)
          if re.search(r"^image:", cfg, flags=re.MULTILINE):
              cfg = re.sub(r"^image:.*$", f"image: {image}", cfg, flags=re.MULTILINE)
          else:
              cfg = re.sub(r"^(version:[^\n]*\n)", rf"\1image: {image}\n", cfg, flags=re.MULTILINE)
          write(f"{app}/config.yaml", cfg)

          # ── CHANGELOG.md prepend ──────────────────────────────────────────
          cl_path = f"{app}/CHANGELOG.md"
          with open(cl_path) as f:
              cl = f.read()
          section = (
              f"## [{version}]({repo}/releases/tag/v{version})\n\n"
              f"{notes.strip()}\n"
          )
          idx = cl.find("\n## [")
          if idx >= 0:
              cl = cl[:idx + 1] + section + "\n" + cl[idx + 1:]
          else:
              cl = cl.rstrip("\n") + "\n\n" + section + "\n"
          with open(cl_path, "w") as f:
              f.write(cl)
          print(f"  prepended to {cl_path}")
          PYEOF

      - name: Open PR and enable auto-merge
        env:
          APP: ${{ github.event.client_payload.app }}
          VERSION: ${{ github.event.client_payload.version }}
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="sync/${APP}-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "${APP}/"
          git commit -m "chore(${APP}): release ${VERSION}"
          git push origin "${BRANCH}"
          BODY="Auto-synced from [ha-app-${APP} v${VERSION}]"
          BODY+="(https://github.com/saya6k/ha-app-${APP}/releases/tag/v${VERSION})."
          PR=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(${APP}): release ${VERSION}" \
            --body "${BODY}" \
          )
          gh pr merge "$PR" --squash --auto --delete-branch
