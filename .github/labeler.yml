# Auto-applied PR labels based on changed paths.
# Consumed by actions/labeler@v6 — schema requires every rule under
# changed-files, never a bare glob list.

"addon:livekit-wakeword":
  - changed-files:
      - any-glob-to-any-file: "livekit-wakeword/**"

"addon:nemo-asr-cpp":
  - changed-files:
      - any-glob-to-any-file: "nemo-asr-cpp/**"

"addon:nemotron-asr-c":
  - changed-files:
      - any-glob-to-any-file: "nemotron-asr-c/**"

"addon:supertonic":
  - changed-files:
      - any-glob-to-any-file: "supertonic/**"

"addon:voiceprint":
  - changed-files:
      - any-glob-to-any-file: "voiceprint/**"

"addon:wardrowbe":
  - changed-files:
      - any-glob-to-any-file: "wardrowbe/**"

"addon:zensical":
  - changed-files:
      - any-glob-to-any-file: "zensical/**"

"addon:otelcol":
  - changed-files:
      - any-glob-to-any-file: "otelcol/**"

"addon:transcribe-cpp":
  - changed-files:
      - any-glob-to-any-file: "transcribe-cpp/**"

"scope:repo":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "README.md"
          - "AGENTS.md"
          - "CLAUDE.md"
          - "repository.yaml"
