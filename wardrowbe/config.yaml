name: Wardrowbe
version: 4.1.1
slug: wardrowbe
description: >-
  Self-hosted AI-powered wardrobe management. Snap photos of your clothes, get
  AI-tagged details, and receive daily outfit suggestions based on weather and
  occasion.
url: https://github.com/Anyesh/wardrowbe
arch:
  - aarch64
  - amd64
init: false
startup: services
map:
  - type: addon_config
    read_only: false
  - type: data
    read_only: false
  - type: share
    read_only: false
backup_exclude:
  - postgres/**
  - redis/**
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Wardrowbe web UI
options:
  postgres_user: wardrobe
  postgres_password: wardrobe
  postgres_db: wardrobe
  secret_key: ''
  nextauth_secret: ''
  dev_login: true
  ai_base_url: http://homeassistant.local:11434/v1
  ai_api_key: ''
  ai_vision_model: gemma3:latest
  ai_text_model: gemma3:latest
  oidc_issuer_url: ''
  oidc_client_id: ''
  oidc_client_secret: ''
  oidc_mobile_client_id: ''
  external_url: ''
  ntfy_server: ''
  ntfy_token: ''
  mattermost_webhook_url: ''
  backup_enabled: true
  backup_retention_days: 7
  backup_hour: 3
schema:
  postgres_user: str
  postgres_password: password
  postgres_db: str
  secret_key: password?
  nextauth_secret: password?
  dev_login: bool
  ai_base_url: str
  ai_api_key: str?
  ai_vision_model: str
  ai_text_model: str
  oidc_issuer_url: str?
  oidc_client_id: str?
  oidc_client_secret: str?
  oidc_mobile_client_id: str?
  external_url: str?
  ntfy_server: str?
  ntfy_token: str?
  mattermost_webhook_url: str?
  backup_enabled: bool
  backup_retention_days: int(0,365)
  backup_hour: int(0,23)
