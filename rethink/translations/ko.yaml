---
configuration:
  hostname:
    name: 호스트명
    description: >-
      LG 기기가 이 부가기능을 찾을 때 사용할 실제 DNS 이름. 본인이 관리하는
      DNS의 A 레코드여야 하며, Home Assistant 호스트 IP를 가리켜야 합니다. 원시
      IP나 mDNS 이름(예: `.local`)은 rethink가 시작 시 거부합니다.
      주의: 이 값은 ThinQ2 기기를 페어링할 때 기기 펌웨어에 저장되는 URL에
      포함됩니다. 페어링 후에 변경하면 해당 ThinQ2 기기를 모두 재페어링해야
      합니다.
  discovery_prefix:
    name: MQTT discovery 접두사
    description: >-
      Home Assistant MQTT 통합의 discovery 접두사와 일치해야 합니다. 기본값은
      "homeassistant"이며, 거기서 별도로 변경하지 않았다면 그대로 두세요.
  rethink_prefix:
    name: MQTT 토픽 접두사
    description: >-
      rethink가 자체적으로 게시할 상태/명령 토픽의 접두사. 기기는
      `<rethink_prefix>/<device-id>/...` 아래에 나타납니다. 브로커에 충돌이
      없으면 기본값 "rethink"가 적당합니다.
  log_levels:
    name: 로그 레벨
    description: >-
      rethink의 어떤 서브시스템을 로깅할지. 기본값으로 일반 운영에 충분합니다.
      "debug"와 "outgoing"은 출력량이 많으니 문제 조사 시에만 켜세요.
  https_port:
    name: ThinQ2 HTTPS 포트
    description: >-
      rethink가 ThinQ2 HTTPS를 listen하는 포트. 기본값 4433. 주의: 이 값은
      ThinQ2 기기를 페어링할 때 기기 펌웨어에 저장되는 URL에 포함됩니다.
      변경 시 해당 ThinQ2 기기를 모두 재페어링해야 합니다.
  mqtts_port:
    name: ThinQ2 MQTTS 포트
    description: >-
      rethink가 ThinQ2 MQTTS(보안)를 listen하는 포트. 기본값 8884. 주의:
      ThinQ2 HTTPS 포트와 동일 — 페어링된 기기 URL에 포함됩니다. 변경 시
      해당 ThinQ2 기기를 모두 재페어링해야 합니다.
  mqtt_port:
    name: ThinQ2 MQTT(평문) 포트
    description: >-
      rethink가 암호화되지 않은 ThinQ2 MQTT를 listen하는 포트. 기본값 1884.
      기기 URL에 포함되지 않으므로 언제든 변경 가능.
  thinq1_https_port:
    name: ThinQ1 HTTPS 포트
    description: >-
      rethink가 ThinQ1 HTTPS를 listen하는 포트. 기본값 46030. ThinQ1 기기는
      DNS hijack을 통해 고정된 표준 포트로 접속하므로, 이 값을 바꿔도 기기
      자체엔 영향 없음 — iptables/NAT 리다이렉트 타겟만 갱신.
  thinq1_port:
    name: ThinQ1 프로토콜 포트
    description: >-
      rethink가 ThinQ1의 TCP 프로토콜을 listen하는 포트. 기본값 47878.
      ThinQ1 HTTPS 포트와 동일한 iptables/NAT 주의사항.
  management_port:
    name: 관리 UI 포트
    description: >-
      rethink 웹 관리 UI 포트. 기본값 44401. 인증 없음 — 네트워크 단에서
      제한 필요. 참고: "OPEN WEB UI" 버튼은 44401일 때만 동작합니다. 변경
      시 직접 http://<HA-IP>:<포트>로 접속.
network:
  4433/tcp: ThinQ2 HTTPS (기기 → rethink)
  8884/tcp: MQTTS (기기)
  1884/tcp: MQTT (기기)
  46030/tcp: ThinQ1 HTTPS
  47878/tcp: ThinQ1
  44401/tcp: 관리 UI (인증 없음 — LAN 차원에서 제한 필요)
