---
configuration:
  hostname:
    name: Hostname
    description: >-
      Real DNS name that LG appliances will use to find this add-on. Must be a
      DNS A record you control, pointing to the Home Assistant host IP. Raw
      IPs and mDNS names (e.g. `.local`) are rejected by rethink at startup.
      WARNING: this value is baked into the URL stored on each ThinQ2 device
      at pairing time. Changing it after pairing requires re-pairing every
      affected ThinQ2 device.
  discovery_prefix:
    name: MQTT discovery prefix
    description: >-
      Must match the discovery prefix configured in your Home Assistant MQTT
      integration. Default is "homeassistant"; only change if you have set
      a custom prefix there.
  rethink_prefix:
    name: MQTT topic prefix
    description: >-
      Prefix for rethink's own state and command topics under MQTT. Devices
      will appear under `<rethink_prefix>/<device-id>/...`. "rethink" is fine
      unless it collides with another integration in your broker.
  log_levels:
    name: Log levels
    description: >-
      Which rethink subsystems to log. Defaults cover normal operation;
      enable "debug" or "outgoing" only when investigating an issue — they
      are noisy.
  https_port:
    name: ThinQ2 HTTPS port
    description: >-
      Port rethink listens on for ThinQ2 HTTPS. Default 4433. WARNING:
      this value is baked into the URL stored on each ThinQ2 device at
      pairing time. Changing it after pairing requires re-pairing every
      affected ThinQ2 device.
  mqtts_port:
    name: ThinQ2 MQTTS port
    description: >-
      Port rethink listens on for ThinQ2 MQTTS (secure). Default 8884.
      WARNING: same as ThinQ2 HTTPS port — embedded in paired-device
      URLs. Changing it requires re-pairing every affected ThinQ2 device.
  mqtt_port:
    name: ThinQ2 MQTT (plain) port
    description: >-
      Port rethink listens on for unencrypted ThinQ2 MQTT. Default 1884.
      Not embedded in device URLs — safe to change any time.
  thinq1_https_port:
    name: ThinQ1 HTTPS port
    description: >-
      Port rethink listens on for ThinQ1 HTTPS. Default 46030. ThinQ1
      devices connect via DNS hijack to a fixed standard port, so
      changing this requires updating your iptables/NAT redirect target,
      not the device.
  thinq1_port:
    name: ThinQ1 protocol port
    description: >-
      Port rethink listens on for ThinQ1's TCP protocol. Default 47878.
      Same iptables/NAT caveat as ThinQ1 HTTPS port.
  management_port:
    name: Management UI port
    description: >-
      Port for rethink's web management UI. Default 44401. NO
      AUTHENTICATION — restrict at the network layer. Note: the "OPEN
      WEB UI" button only works if this stays at 44401; if you change it,
      access manually at http://<HA-IP>:<port>.
network:
  4433/tcp: ThinQ2 HTTPS (devices → rethink)
  8884/tcp: MQTTS (devices)
  1884/tcp: MQTT (devices)
  46030/tcp: ThinQ1 HTTPS
  47878/tcp: ThinQ1
  44401/tcp: Management UI (no authentication — restrict on LAN)
