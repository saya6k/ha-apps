---
version: 0.1.0
slug: rethink
name: rethink
description: Local LG ThinQ cloud replacement (anszom/rethink) — supported devices via MQTT
url: https://github.com/anszom/rethink
arch:
  - amd64
  - aarch64
init: false
host_network: true
services:
  - mqtt:need
backup_exclude:
  - "state/**"
options:
  hostname: rethink.lan
  discovery_prefix: homeassistant
  rethink_prefix: rethink
  log_levels:
    - status
    - incoming
    - HTTPS
    - publish
    - MGMT
  # Port overrides. Defaults are rethink upstream values; change if they
  # collide with another service on the HA host (e.g. Mosquitto's WebSocket
  # listeners on 1884/8884).
  https_port: 4433
  mqtts_port: 8884
  mqtt_port: 1884
  thinq1_https_port: 46030
  thinq1_port: 47878
  management_port: 44401
schema:
  hostname: str
  discovery_prefix: str
  rethink_prefix: str
  log_levels:
    - list(status|incoming|HTTPS|publish|MGMT|outgoing|debug)
  https_port: port
  mqtts_port: port
  mqtt_port: port
  thinq1_https_port: port
  thinq1_port: port
  management_port: port
# Even with host_network: true, `ports:` must be declared so the
# `[PORT:44401]` placeholder in `webui` resolves. host_network means the
# value `null` is fine — there is no host-side mapping, the container port
# equals the host port.
ports:
  "4433/tcp": null
  "8884/tcp": null
  "1884/tcp": null
  "46030/tcp": null
  "47878/tcp": null
  "44401/tcp": null
ports_description:
  "4433/tcp": "ThinQ2 HTTPS (devices → rethink)"
  "8884/tcp": "MQTTS (devices)"
  "1884/tcp": "MQTT (devices)"
  "46030/tcp": "ThinQ1 HTTPS"
  "47878/tcp": "ThinQ1"
  "44401/tcp": "Management UI (NO AUTH)"
webui: "http://[HOST]:[PORT:44401]"
homeassistant: 2023.8.0
# Uncomment once deploy.yaml has published prebuilt images to GHCR:
# image: ghcr.io/saya6k/{arch}-addon-rethink
