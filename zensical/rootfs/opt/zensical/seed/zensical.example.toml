# Zensical config for your Home Assistant /config directory.
#
# Rename this file to `zensical.toml` and the add-on will pick it up
# automatically. The same file is also what you publish to GitHub — a
# `zensical build` at the repo root will read it and produce the same
# site (modulo absolute vs. relative paths, see below).
#
# IMPORTANT: the add-on overrides `docs_dir` and `site_dir` at runtime
# to its own container paths. Anything you set here is honoured by
# `zensical build` outside the add-on (e.g. in a GitHub Actions
# workflow) but ignored *inside* the add-on. So feel free to use
# GitHub-Pages-friendly values here.

[project]
site_name = "My Home Assistant Documentation"
site_description = "Configuration, automations, dashboards"

# Relative to this file. /config/docs/ on disk; ./docs in your GitHub
# repo. The add-on overrides this to /var/lib/zensical/docs but the
# value matters when you `zensical build` outside the container.
docs_dir = "docs"

# GitHub Pages convention. Add `_site/` to your .gitignore.
site_dir = "_site"

# Required for the add-on (ingress strips the URL prefix, browsers
# need relative *.html links). Safe to keep when publishing too.
use_directory_urls = false

[project.theme]
features = [
    "content.code.copy",
    "content.tabs.link",
    "navigation.footer",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Zensical enables abbr/admonition/footnotes/pymdownx.* by default; only
# add overrides here if you want something different.
[project.markdown_extensions.tables]
