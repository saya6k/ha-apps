# Bundled Zensical config for the Home Assistant add-on.
#
# Zensical applies DEFAULT_MARKDOWN_EXTENSIONS (abbr, admonition,
# attr_list, def_list, footnotes, md_in_html, toc[permalink], pymdownx.*
# including emoji with Zensical's twemoji backend, superfences with
# mermaid, tabbed, tasklist, …) on top of whatever we declare here, so
# this file only sets the knobs that *differ* from those defaults.

[project]
site_name = "Home Assistant Documentation"
site_description = "Documentation rendered from /config/docs/"

# Relative to this file's directory (Zensical 0.0.43 rejects absolute
# paths here). effective-config.py rewrites these to "docs"/"site" and
# writes the effective config to /var/lib/zensical/zensical.toml, so
# they resolve to /var/lib/zensical/{docs,site}.
docs_dir = "docs"
site_dir = "site"

# Load-bearing: generates plain *.html links that browsers resolve
# relative to the current URL, so the site survives Home Assistant
# ingress stripping the path prefix on its way to the add-on. Do not
# change to true without rethinking the nginx layer.
use_directory_urls = false

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# `tables` (Python-Markdown's GFM-style table extension) is not in
# Zensical's default extension set, so opt in explicitly.
[project.markdown_extensions.tables]
