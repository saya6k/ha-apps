error_log stderr warn;
pid /run/nginx.pid;

worker_processes auto;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log off;

    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/http.d/*.conf;
}
