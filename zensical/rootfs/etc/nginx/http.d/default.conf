server {
    listen 8099 default_server;
    server_name _;

    # Allow the Home Assistant ingress proxy and the container's own
    # loopback (the Dockerfile HEALTHCHECK curls 127.0.0.1:8099 — without
    # this it would 403 and Supervisor would restart the container every
    # ~90s). The add-on has no auth layer of its own; everything else
    # stays blocked.
    allow 172.30.32.2;
    allow 127.0.0.1;
    deny  all;

    root  /var/lib/zensical/site;
    index index.html;

    # use_directory_urls = false in zensical.toml generates *.html — the
    # second try_files entry is just a courtesy if someone pastes a bare URL.
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Static assets carry hashed filenames, so cache aggressively.
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
