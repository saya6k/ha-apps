---
name: Playwright Browser
version: 0.3.1-rc.0
image: ghcr.io/saya6k/app-playwright
slug: playwright
description: >-
  Safe browser automation for Assist conversation agents over MCP.
  Playwright drives headless Chromium behind a domain allowlist; secrets
  are injected bridge-side from 1Password or Bitwarden and never enter
  the conversation.
url: https://github.com/saya6k/ha-app-playwright
arch:
  - aarch64
  - amd64
init: false
startup: services
discovery:
  - mcp
ingress: true
panel_icon: mdi:web
panel_title: Playwright
ports:
  8099/tcp: null
ports_description:
  8099/tcp: >-
    MCP endpoint (streamable HTTP at /mcp) and session viewer. Leave
    unset — Home Assistant reaches it over the internal network; map it
    only for external MCP clients.
options:
  advanced_tools: false
  allowed_domains:
    - the-internet.herokuapp.com
  bitwarden_access_token: ""
  bitwarden_ca_cert: ""
  bitwarden_client_id: ""
  bitwarden_client_secret: ""
  bitwarden_master_password: ""
  bitwarden_organization_id: ""
  bitwarden_server_url: "https://vault.bitwarden.com"
  local_secrets:
    - site: "https://the-internet.herokuapp.com"
      id: "tomsmith"
      pw: "SuperSecretPassword!"
  onepassword_connect_embedded: false
  onepassword_connect_host: ""
  onepassword_connect_token: ""
  onepassword_connect_version: "1.8.0"
  onepassword_credentials: ""
  onepassword_token: ""
  passkeys: false
  persist_session: false
  secret_provider: "local"
  session_idle_timeout: 300
schema:
  advanced_tools: bool
  allowed_domains:
    - str
  bitwarden_access_token: password
  bitwarden_ca_cert: str?
  bitwarden_client_id: str?
  bitwarden_client_secret: password
  bitwarden_master_password: password
  bitwarden_organization_id: str?
  bitwarden_server_url: url
  local_secrets:
    - site: url
      id: str
      pw: password
  onepassword_connect_embedded: bool
  onepassword_connect_host: str?
  onepassword_connect_token: password
  onepassword_connect_version: str
  onepassword_credentials: password
  onepassword_token: password
  passkeys: bool
  persist_session: bool
  secret_provider: list(local|1password|1password-connect|bitwarden|bitwarden-vault)
  session_idle_timeout: int(30,3600)
