---
configuration:
  advanced_tools:
    name: Advanced tools
    description: >-
      Expose browser_evaluate (arbitrary JavaScript) and browser_screenshot
      to the conversation agent. Off by default — enable only if you
      understand the risk surface.
  allowed_domains:
    name: Allowed domains
    description: >-
      Domains the browser may navigate to (subdomains included, HTTPS
      only). An empty list rejects every navigation — you must add at
      least one domain for the app to be useful.
  bitwarden_access_token:
    name: Bitwarden access token
    description: >-
      Machine account access token for Bitwarden Secrets Manager. Used
      only when the secret provider is set to bitwarden.
  bitwarden_ca_cert:
    name: Bitwarden CA certificate (PEM)
    description: >-
      Optional PEM certificate to trust when your self-hosted Bitwarden /
      Vaultwarden uses a self-signed or private-CA TLS certificate. The
      Bitwarden CLI requires HTTPS — plain http server URLs do not work.
  bitwarden_client_id:
    name: Bitwarden API key client_id
    description: >-
      Personal API key client_id (user.xxxxxxxx…) for the bitwarden-vault
      provider. Found in the web vault under Settings → Security → Keys.
      SSO accounts can use this too — no interactive login needed.
  bitwarden_client_secret:
    name: Bitwarden API key client_secret
    description: >-
      Personal API key client_secret for the bitwarden-vault provider.
  bitwarden_master_password:
    name: Bitwarden master password
    description: >-
      Master password used to unlock the personal vault (bitwarden-vault
      provider only). Kept in memory and masked from every log and tool
      result; nothing is written to disk.
  bitwarden_organization_id:
    name: Bitwarden organization ID
    description: >-
      Organization UUID for listing secret names with the secret_names
      tool. Optional — resolving secrets by UUID works without it.
  bitwarden_server_url:
    name: Bitwarden server URL
    description: >-
      Bitwarden server to talk to. Keep the default for bitwarden.com or
      point it at your self-hosted instance.
  local_secrets:
    name: Local secrets (testing only)
    description: >-
      ⚠️ For testing only — entries are stored in plain text in the
      add-on configuration. The values are still never shown to the
      conversation agent (it only sees <site>/id and <site>/pw
      references), but use 1Password or Bitwarden for real credentials.
      The default entry works with the-internet.herokuapp.com's login
      demo page.
  onepassword_connect_host:
    name: 1Password Connect host
    description: >-
      URL of your self-hosted 1Password Connect server (e.g.
      http://192.168.1.10:8080). Used only when the secret provider is
      set to 1password-connect.
  onepassword_connect_token:
    name: 1Password Connect token
    description: >-
      Access token for your 1Password Connect server. Used only when the
      secret provider is set to 1password-connect.
  onepassword_token:
    name: 1Password token
    description: >-
      Service Account token for 1Password. Used only when the secret
      provider is set to 1password.
  passkeys:
    name: Passkeys (WebAuthn)
    description: >-
      Let the browser sign in to sites with passkeys stored in your
      Bitwarden personal vault (bitwarden-vault provider only). Keys are
      injected into an in-memory virtual authenticator and are never
      written to disk. The add-on cannot create new passkeys.
  persist_session:
    name: Persist browser session
    description: >-
      Keep cookies and storage across browser sessions inside the
      container. Off by default — every session starts clean.
  secret_provider:
    name: Secret provider
    description: >-
      Where {{secret:...}} placeholders are resolved from. Secret values
      are injected by the bridge and never returned to the conversation.
      1password = cloud Service Account · 1password-connect = self-hosted
      Connect server · bitwarden = Secrets Manager access token ·
      bitwarden-vault = personal vault via API key (works with
      Vaultwarden and SSO accounts) · local = the local_secrets option,
      testing only.
  session_idle_timeout:
    name: Session idle timeout
    description: >-
      Seconds of inactivity before the browser session is closed
      automatically (30-3600).
