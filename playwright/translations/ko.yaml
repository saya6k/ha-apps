---
configuration:
  advanced_tools:
    name: 고급 도구
    description: >-
      browser_evaluate(임의 JavaScript)와 browser_screenshot을 대화
      에이전트에 노출합니다. 기본 꺼짐 — 위험 표면을 이해하는 경우에만
      켜세요.
  allowed_domains:
    name: 허용 도메인
    description: >-
      브라우저가 이동할 수 있는 도메인 목록입니다(서브도메인 포함, HTTPS
      전용). 빈 목록이면 모든 이동이 거부되므로 최소 한 개 이상 추가해야
      합니다.
  bitwarden_access_token:
    name: Bitwarden 액세스 토큰
    description: >-
      Bitwarden Secrets Manager의 머신 계정 액세스 토큰입니다. secret
      provider가 bitwarden일 때만 사용됩니다.
  bitwarden_ca_cert:
    name: Bitwarden CA 인증서 (PEM)
    description: >-
      셀프호스팅 Bitwarden/Vaultwarden이 자체 서명 또는 사설 CA TLS
      인증서를 쓸 때 신뢰할 PEM 인증서입니다(선택). Bitwarden CLI는
      HTTPS를 강제하므로 http 서버 주소는 동작하지 않습니다.
  bitwarden_client_id:
    name: Bitwarden API 키 client_id
    description: >-
      bitwarden-vault 공급자용 개인 API 키 client_id(user.xxxxxxxx…)
      입니다. 웹 vault의 설정 → 보안 → 키에서 확인합니다. SSO 계정도
      사용 가능 — 대화형 로그인이 필요 없습니다.
  bitwarden_client_secret:
    name: Bitwarden API 키 client_secret
    description: >-
      bitwarden-vault 공급자용 개인 API 키 client_secret입니다.
  bitwarden_master_password:
    name: Bitwarden 마스터 비밀번호
    description: >-
      개인 vault 잠금 해제에 사용하는 마스터 비밀번호입니다
      (bitwarden-vault 전용). 메모리에만 보관되고 모든 로그·도구 결과에서
      마스킹되며, 디스크에는 아무것도 기록되지 않습니다.
  bitwarden_organization_id:
    name: Bitwarden 조직 ID
    description: >-
      secret_names 도구로 secret 이름 목록을 조회할 때 필요한 조직
      UUID입니다. 선택 사항 — UUID로 secret을 resolve하는 데는 필요
      없습니다.
  bitwarden_server_url:
    name: Bitwarden 서버 URL
    description: >-
      사용할 Bitwarden 서버입니다. bitwarden.com은 기본값을 유지하고,
      셀프호스팅 인스턴스는 주소를 지정하세요.
  local_secrets:
    name: 로컬 secret (테스트 전용)
    description: >-
      ⚠️ 테스트 전용 — 항목이 애드온 설정에 평문으로 저장됩니다. 값은
      대화 에이전트에 절대 노출되지 않지만(<site>/id, <site>/pw 참조만
      보임), 실제 자격 증명에는 1Password나 Bitwarden을 사용하세요.
      기본 항목은 the-internet.herokuapp.com 로그인 데모 페이지용입니다.
  onepassword_connect_embedded:
    name: 내장 1Password Connect
    description: >-
      애드온 안에서 1Password Connect 서버를 실행합니다. 최초 기동 시 이
      기기가 Docker Hub에서 공식 Connect 이미지를 직접 내려받아(digest
      검증, 애드온이 재배포하지 않음) chroot로 격리 실행합니다.
      onepassword_credentials와 onepassword_connect_token이 필요합니다.
      Connect 사용에는 1Password 약관이 적용됩니다.
  onepassword_connect_host:
    name: 1Password Connect 호스트
    description: >-
      셀프호스팅 1Password Connect 서버의 URL입니다(예:
      http://192.168.1.10:8080). secret provider가 1password-connect일
      때만 사용됩니다.
  onepassword_connect_token:
    name: 1Password Connect 토큰
    description: >-
      1Password Connect 서버의 액세스 토큰입니다. secret provider가
      1password-connect일 때만 사용됩니다.
  onepassword_connect_version:
    name: 내장 Connect 버전
    description: >-
      내장 서버가 받아올 공식 Connect 이미지의 버전 태그입니다.
  onepassword_credentials:
    name: 1Password Connect 자격증명 (base64)
    description: >-
      1password-credentials.json 내용의 base64 인코딩입니다. 내장
      Connect 서버에서만 사용되며, 일반 Connect 배포와 동일하게 /data에
      저장됩니다.
  onepassword_token:
    name: 1Password 토큰
    description: >-
      1Password Service Account 토큰입니다. secret provider가 1password일
      때만 사용됩니다.
  passkeys:
    name: Passkey (WebAuthn)
    description: >-
      Bitwarden 개인 vault에 저장된 passkey로 사이트에 로그인할 수 있게
      합니다(bitwarden-vault 전용). 키는 메모리 내 가상 인증기에만
      주입되며 디스크에 기록되지 않습니다. 애드온이 새 passkey를 만들
      수는 없습니다.
  persist_session:
    name: 브라우저 세션 유지
    description: >-
      쿠키·스토리지를 컨테이너 안에서 세션 간 유지합니다. 기본 꺼짐 —
      매 세션이 깨끗하게 시작됩니다.
  secret_provider:
    name: Secret 공급자
    description: >-
      {{secret:...}} 자리표시자를 resolve할 곳입니다. secret 값은
      bridge가 주입하며 대화로는 절대 반환되지 않습니다. 1password =
      클라우드 Service Account · 1password-connect = 셀프호스팅 Connect
      서버 · bitwarden = Secrets Manager 액세스 토큰 · bitwarden-vault =
      API 키 기반 개인 vault(Vaultwarden·SSO 계정 지원) · local =
      local_secrets 옵션(테스트 전용).
  session_idle_timeout:
    name: 세션 유휴 시간 제한
    description: >-
      이 시간(초) 동안 활동이 없으면 브라우저 세션을 자동으로 종료합니다
      (30-3600).
