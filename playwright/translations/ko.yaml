---
configuration:
  advanced_tools:
    name: 고급 도구
    description: >-
      browser_evaluate(임의 JavaScript)와 browser_screenshot을 대화
      에이전트에 노출합니다. 기본 꺼짐 — 위험 표면을 이해하는 경우에만
      켜세요.
  allowed_domains:
    name: 허용 도메인
    description: >-
      브라우저가 이동할 수 있는 도메인 목록입니다(서브도메인 포함, HTTPS
      전용). 빈 목록이면 모든 이동이 거부되므로 최소 한 개 이상 추가해야
      합니다.
  bitwarden_access_token:
    name: Bitwarden 액세스 토큰
    description: >-
      Bitwarden Secrets Manager의 머신 계정 액세스 토큰입니다. secret
      provider가 bitwarden일 때만 사용됩니다.
  bitwarden_organization_id:
    name: Bitwarden 조직 ID
    description: >-
      secret_names 도구로 secret 이름 목록을 조회할 때 필요한 조직
      UUID입니다. 선택 사항 — UUID로 secret을 resolve하는 데는 필요
      없습니다.
  bitwarden_server_url:
    name: Bitwarden 서버 URL
    description: >-
      사용할 Bitwarden 서버입니다. bitwarden.com은 기본값을 유지하고,
      셀프호스팅 인스턴스는 주소를 지정하세요.
  local_secrets:
    name: 로컬 secret (테스트 전용)
    description: >-
      ⚠️ 테스트 전용 — 항목이 애드온 설정에 평문으로 저장됩니다. 값은
      대화 에이전트에 절대 노출되지 않지만(<site>/id, <site>/pw 참조만
      보임), 실제 자격 증명에는 1Password나 Bitwarden을 사용하세요.
      기본 항목은 the-internet.herokuapp.com 로그인 데모 페이지용입니다.
  onepassword_token:
    name: 1Password 토큰
    description: >-
      1Password Service Account 토큰입니다. secret provider가 1password일
      때만 사용됩니다.
  persist_session:
    name: 브라우저 세션 유지
    description: >-
      쿠키·스토리지를 컨테이너 안에서 세션 간 유지합니다. 기본 꺼짐 —
      매 세션이 깨끗하게 시작됩니다.
  secret_provider:
    name: Secret 공급자
    description: >-
      {{secret:...}} 자리표시자를 resolve할 곳입니다. secret 값은
      bridge가 주입하며 대화로는 절대 반환되지 않습니다. "local"은
      local_secrets 옵션을 읽는 테스트 전용 공급자입니다.
  session_idle_timeout:
    name: 세션 유휴 시간 제한
    description: >-
      이 시간(초) 동안 활동이 없으면 브라우저 세션을 자동으로 종료합니다
      (30-3600).
