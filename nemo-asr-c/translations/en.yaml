---
configuration:
  model:
    name: Model (HuggingFace repo)
    description: >-
      HuggingFace repository ID containing the .nemo model file to download,
      convert, and run. Any Nemotron-architecture .nemo (including fine-tuned
      variants) is supported — the .nemo is converted to a C-runtime .bin at
      boot. Changing this re-downloads and re-converts on next start.
  quantization:
    name: Weight quantization
    description: >-
      Weight precision for the converted .bin runtime file. f32 = no
      quantization (largest, bit-exact); bf16 = bfloat16 linear weights; w8a16
      = int8 weights with fp16 compute; q8p = W8A8 packed int8 (default,
      fastest); q4p = 4-bit packed. Changing this re-converts on next start.
  chunk_size:
    name: Chunk size (accuracy vs speed)
    description: >-
      Streaming lookahead (att_right) the encoder uses. Larger = more
      right-context = more accurate, but more compute per chunk. 80ms
      (fastest) · 160ms · 320ms (default) · 560ms · 1120ms (most accurate).
      No re-download — applied on next start.
  hf_token:
    name: HuggingFace token
    description: >-
      Optional access token for gated/private model repos and to lift anonymous
      download rate limits. Leave empty for public models.
  debug_logging:
    name: Debug logging
    description: Enable verbose logging for troubleshooting.
