version: 0.2.8
slug: nemo-asr-c
name: NeMo ASR (C)
description: >-
  Streaming speech-to-text over Wyoming — NVIDIA Nemotron ASR on pure C
  (nemotron-asr-streaming.c), converts .nemo at boot
url: https://github.com/kdrkdrkdr/nemotron-asr-streaming.c
stage: experimental
arch:
  - amd64
  - aarch64
init: false
discovery:
  - wyoming
backup_exclude:
  - models/**
options:
  model: nvidia/nemotron-3.5-asr-streaming-0.6b
  quantization: q8p
  chunk_size: 320ms
  hotwords: []
  hf_token: ''
schema:
  model: str
  quantization: list(f32|bf16|w8a16|q8p|q4p)
  chunk_size: list(80ms|160ms|320ms|560ms|1120ms)
  hotwords:
    - str?
  hotword_boost: float(0,10)?
  hf_token: password?
  debug_logging: bool?
ports:
  10370/tcp: null
ports_description:
  10370/tcp: NeMo ASR (C) Wyoming Protocol
homeassistant: 2023.8.0.dev20230718
