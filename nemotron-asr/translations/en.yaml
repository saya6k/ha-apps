---
configuration:
  language:
    name: Fallback language
    description: >-
      Language used when the Home Assistant voice pipeline doesn't send one.
      "Auto" lets the model detect the language. The per-request language from
      the pipeline always takes priority over this fallback.
  num_threads:
    name: CPU threads
    description: >-
      ONNX Runtime intra-op thread count, also applied to OpenMP/OpenBLAS.
      0 = use all cores.
  model_repo:
    name: Model repo (HuggingFace)
    description: >-
      HuggingFace repo id of the ONNX export. Must contain encoder.onnx
      (+ encoder.onnx.data), decoder_joint.onnx, tokenizer.model and
      config.json. Downloaded to /data/models/<name> on first start (~1.4 GB).
  transcript_streaming:
    name: Live partial transcripts
    description: >-
      Emit live partial text (Wyoming TranscriptChunk) while you speak. Turn
      this OFF if your Home Assistant voice pipeline errors mid-utterance (for
      example shows "[object Object]"); the final transcript still works.
  hotwords:
    name: Hotwords (vocabulary biasing)
    description: >-
      Phrases to bias recognition toward — one per item (room names, entity
      names, people). Useful for known vocabulary the model otherwise mishears.
      Best-effort with greedy decoding.
  hotword_boost:
    name: Hotword boost
    description: >-
      Advanced. Strength of the hotword bias (logit bonus per token). Default 2.
      Higher forces hotwords harder; too high can cause false matches.
  hf_token:
    name: HuggingFace token
    description: >-
      Optional access token for gated/private model repos and to lift anonymous
      download rate limits. Leave empty for public models.
  debug_logging:
    name: Debug logging
    description: Enable verbose logging for troubleshooting.
